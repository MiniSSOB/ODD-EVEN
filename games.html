<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX - Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-center {
            text-align: center;
            padding-top: 40px;
        }
        
        h1 {
            color: #8B0000;
            font-size: 3rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
            display: inline-block;
        }
        
        .nav-bar {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2rem;
            padding: 5px 10px;
            border: 1px solid #8B0000;
            border-radius: 5px;
        }
        
        .nav-bar a:hover {
            background-color: #8B0000;
            color: black;
        }
        
        .games-container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 90%;
            padding: 20px;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .game-card {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            background-color: rgba(139, 0, 0, 0.05);
            transition: transform 0.3s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.3);
        }
        
        .game-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #8B0000;
        }
        
        .game-developer {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .game-description {
            color: #ccc;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .game-category {
            background-color: #8B0000;
            color: black;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        
        .game-platform {
            background-color: transparent;
            color: #8B0000;
            border: 1px solid #8B0000;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        
        .play-button {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background-color: transparent;
            color: #8B0000;
            border: 2px solid #8B0000;
            text-decoration: none;
            text-align: center;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .play-button:hover {
            background-color: #8B0000;
            color: black;
        }
        
        .no-games {
            text-align: center;
            padding: 60px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            margin: 40px 0;
        }
        
        .no-games p {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #8B0000;
        }
        
        .submit-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #8B0000;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
        }
        
        .submit-link:hover {
            background-color: transparent;
            color: #8B0000;
            border: 2px solid #8B0000;
        }
        
        .bottom {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
        
        .copyright {
            color: #8B0000;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        
        /* Admin section (hidden by default) */
        .admin-section {
            margin-top: 40px;
            border-top: 1px solid #8B0000;
            padding-top: 20px;
        }
        
        .admin-toggle {
            text-align: center;
            margin: 20px 0;
        }
        
        .admin-toggle button {
            background-color: transparent;
            color: #8B0000;
            border: 1px solid #8B0000;
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .admin-panel {
            display: none;
            padding: 20px;
            border: 1px solid #8B0000;
            border-radius: 5px;
            background-color: rgba(139, 0, 0, 0.1);
        }
        
        .admin-panel.show {
            display: block;
        }
        
        .pending-games {
            margin-bottom: 20px;
        }
        
        .pending-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #333;
        }
        
        .pending-item:last-child {
            border-bottom: none;
        }
        
        .pending-info {
            flex: 1;
        }
        
        .pending-title {
            font-weight: bold;
            color: #8B0000;
        }
        
        .pending-dev {
            font-size: 0.9rem;
            color: #666;
        }
        
        .pending-actions button {
            background-color: transparent;
            color: #8B0000;
            border: 1px solid #8B0000;
            padding: 5px 10px;
            margin-left: 5px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .pending-actions button:hover {
            background-color: #8B0000;
            color: black;
        }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="nav-bar">
        <a href="index.html">HOME</a>
        <a href="games.html">GAMES</a>
        <a href="submit.html">SUBMIT GAME</a>
    </div>
    
    <div class="games-container">
        <h2>🎮 GAME LIBRARY</h2>
        
        <div id="gamesGrid" class="games-grid">
            <!-- Games will be loaded here via JavaScript -->
        </div>
        
        <!-- Admin section (hidden from regular users) -->
        <div class="admin-section">
            <div class="admin-toggle">
                <button onclick="toggleAdminPanel()">👑 ADMIN PANEL</button>
            </div>
            <div id="adminPanel" class="admin-panel">
                <h3>Pending Submissions</h3>
                <div id="pendingList" class="pending-games">
                    <!-- Pending games will appear here -->
                </div>
                <p style="color: #666; font-size: 0.9rem;">Tip: When you approve a game, create a folder in your GitHub repo named after the game and upload the files there. Then add the game to the approved list below.</p>
            </div>
        </div>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>

    <script>
        // Approved games (you'll manually add these as you approve submissions)
        let approvedGames = [
            // Add approved games here in this format:
            // {
            //     id: 1,
            //     name: "Game Name",
            //     developer: "Developer Name",
            //     description: "Game description",
            //     category: "action",
            //     platform: "both",
            //     gameUrl: "/games/game-folder-name/",
            //     dateAdded: "2026-02-22"
            // }
        ];
        
        // Load pending submissions from localStorage
        let pendingSubmissions = JSON.parse(localStorage.getItem('gameSubmissions')) || [];
        
        // Load saved approved games if any
        const savedGames = localStorage.getItem('approvedGames');
        if (savedGames) {
            approvedGames = JSON.parse(savedGames);
        }
        
        // Display games on page load
        window.onload = function() {
            displayGames();
            displayPendingSubmissions();
        };
        
        function displayGames() {
            const gamesGrid = document.getElementById('gamesGrid');
            
            if (approvedGames.length === 0) {
                gamesGrid.innerHTML = `
                    <div class="no-games">
                        <p>🚀 No games yet!</p>
                        <p style="font-size: 1rem; margin-bottom: 30px;">Be the first to submit your game to MiniBOSSX</p>
                        <a href="submit.html" class="submit-link">SUBMIT A GAME</a>
                    </div>
                `;
                return;
            }
            
            let html = '';
            approvedGames.forEach(game => {
                html += `
                    <div class="game-card">
                        <h3 class="game-title">${game.name}</h3>
                        <div class="game-developer">by ${game.developer}</div>
                        <div class="game-description">${game.description}</div>
                        <div class="game-meta">
                            <span class="game-category">${game.category.toUpperCase()}</span>
                            <span class="game-platform">${game.platform.toUpperCase()}</span>
                        </div>
                        <a href="${game.gameUrl}" class="play-button" target="_blank">▶ PLAY NOW</a>
                    </div>
                `;
            });
            
            gamesGrid.innerHTML = html;
        }
        
        function displayPendingSubmissions() {
            const pendingList = document.getElementById('pendingList');
            
            if (pendingSubmissions.length === 0) {
                pendingList.innerHTML = '<p style="color: #666;">No pending submissions</p>';
                return;
            }
            
            let html = '';
            pendingSubmissions.forEach(sub => {
                if (sub.status === 'pending') {
                    html += `
                        <div class="pending-item" data-id="${sub.id}">
                            <div class="pending-info">
                                <div class="pending-title">${sub.gameName}</div>
                                <div class="pending-dev">by ${sub.developerName} (${sub.developerEmail})</div>
                                <div style="font-size: 0.8rem; color: #666;">Submitted: ${sub.dateSubmitted}</div>
                                <div style="font-size: 0.8rem; color: #8B0000;">Link: <a href="${sub.gameLink}" target="_blank" style="color: #8B0000;">Download Game</a></div>
                            </div>
                            <div class="pending-actions">
                                <button onclick="approveGame(${sub.id})">✓ Approve</button>
                                <button onclick="rejectGame(${sub.id})">✗ Reject</button>
                            </div>
                        </div>
                    `;
                }
            });
            
            pendingList.innerHTML = html || '<p style="color: #666;">No pending submissions</p>';
        }
        
        function approveGame(id) {
            const submission = pendingSubmissions.find(s => s.id === id);
            if (!submission) return;
            
            // Prompt for the game URL (where you'll host it)
            const gameFolderName = prompt('Enter the folder name for this game (e.g., my-awesome-game):', 
                submission.gameName.toLowerCase().replace(/[^a-z0-9]+/g, '-'));
            
            if (!gameFolderName) return;
            
            // Add to approved games
            const newGame = {
                id: Date.now(),
                name: submission.gameName,
                developer: submission.developerName,
                description: submission.gameDescription,
                category: submission.gameCategory,
                platform: submission.gamePlatform,
                gameUrl: `/games/${gameFolderName}/`,
                dateAdded: new Date().toISOString().split('T')[0]
            };
            
            approvedGames.push(newGame);
            localStorage.setItem('approvedGames', JSON.stringify(approvedGames));
            
            // Remove from pending
            submission.status = 'approved';
            localStorage.setItem('gameSubmissions', JSON.stringify(pendingSubmissions));
            
            // Show instructions
            alert(`✅ Game approved!\n\nNext steps:\n1. Create a folder in your GitHub repo: /games/${gameFolderName}/\n2. Download the game from: ${submission.gameLink}\n3. Upload all game files to that folder\n4. Make sure index.html is in the root of that folder\n5. Commit and push to GitHub\n\nThe game will be live at: https://minibossx.com/games/${gameFolderName}/`);
            
            // Refresh displays
            displayGames();
            displayPendingSubmissions();
        }
        
        function rejectGame(id) {
            if (!confirm('Reject this submission?')) return;
            
            const index = pendingSubmissions.findIndex(s => s.id === id);
            if (index !== -1) {
                pendingSubmissions[index].status = 'rejected';
                localStorage.setItem('gameSubmissions', JSON.stringify(pendingSubmissions));
                displayPendingSubmissions();
            }
        }
        
        function toggleAdminPanel() {
            document.getElementById('adminPanel').classList.toggle('show');
        }
    </script>
</body>
</html>
