<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX - Games</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-center {
            text-align: center;
            padding-top: 40px;
        }
        
        h1 {
            color: #8B0000;
            font-size: 3rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
            display: inline-block;
        }
        
        .nav-bar {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 15px;
            font-size: 1.2rem;
            padding: 5px 10px;
            border: 1px solid #8B0000;
            border-radius: 5px;
        }
        
        .nav-bar a:hover {
            background-color: #8B0000;
            color: black;
        }
        
        .games-container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 90%;
            padding: 20px;
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .game-card {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            background-color: rgba(139, 0, 0, 0.05);
            transition: transform 0.3s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(139, 0, 0, 0.3);
        }
        
        .game-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #8B0000;
        }
        
        .game-developer {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .game-description {
            color: #ccc;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .game-category {
            background-color: #8B0000;
            color: black;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        
        .game-platform {
            background-color: transparent;
            color: #8B0000;
            border: 1px solid #8B0000;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.8rem;
        }
        
        .play-button {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background-color: transparent;
            color: #8B0000;
            border: 2px solid #8B0000;
            text-decoration: none;
            text-align: center;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .play-button:hover {
            background-color: #8B0000;
            color: black;
        }
        
        .no-games {
            text-align: center;
            padding: 60px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            margin: 40px 0;
        }
        
        .no-games p {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #8B0000;
        }
        
        .submit-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #8B0000;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1rem;
        }
        
        .submit-link:hover {
            background-color: transparent;
            color: #8B0000;
            border: 2px solid #8B0000;
        }
        
        .bottom {
            text-align: center;
            padding: 20px 0;
            margin-top: 40px;
        }
        
        .copyright {
            color: #8B0000;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="nav-bar">
        <a href="index.html">HOME</a>
        <a href="games.html">GAMES</a>
        <a href="submit.html">SUBMIT GAME</a>
    </div>
    
    <div class="games-container">
        <h2>🎮 GAME LIBRARY</h2>
        
        <div id="gamesGrid" class="games-grid">
            <div class="no-games">
                <p>🚀 No games yet!</p>
                <p style="font-size: 1rem; margin-bottom: 30px;">Be the first to submit your game to MiniBOSSX</p>
                <a href="submit.html" class="submit-link">SUBMIT A GAME</a>
            </div>
        </div>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>
</body>
</html>
