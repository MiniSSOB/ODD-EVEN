<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MiniBOSSX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background: #8B0000;
            color: black;
        }
        
        /* Login */
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border: 2px solid #8B0000;
            border-radius: 15px;
            text-align: center;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .login-box button:hover {
            background: #8B0000;
            color: black;
        }
        
        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }
        
        /* Admin Panel */
        .admin-panel {
            display: none;
        }
        
        h2 {
            margin: 30px 0 20px;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 10px;
        }
        
        .game-card {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(139, 0, 0, 0.05);
        }
        
        .game-card h3 {
            margin-bottom: 10px;
        }
        
        .info {
            color: #ccc;
            margin: 5px 0;
        }
        
        .info strong {
            color: #8B0000;
            width: 100px;
            display: inline-block;
        }
        
        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: 2px solid #8B0000;
            background: transparent;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            flex: 1;
        }
        
        .btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .btn-approve {
            background: #8B0000;
            color: black;
        }
        
        .logout {
            float: right;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 3px;
        }
        
        /* Modal for testing */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
        }
        
        .modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            margin: 2% auto;
            background: black;
            border: 2px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
        }
        
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #8B0000;
            font-size: 30px;
            cursor: pointer;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .no-items {
            text-align: center;
            padding: 40px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="loginScreen" class="login-box">
        <h2>🔐 ADMIN LOGIN</h2>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="minibossx2026">
        <button onclick="login()">LOGIN</button>
        <div id="loginError" class="error">Invalid credentials</div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <button class="logout" onclick="logout()">LOGOUT</button>
            <h1>⚡ ADMIN PANEL ⚡</h1>
            
            <div class="nav-bar">
                <a href="index.html">HOME</a>
                <a href="submit.html">SUBMIT</a>
                <a href="admin.html">ADMIN</a>
            </div>
            
            <h2>📥 PENDING GAMES</h2>
            <div id="pendingList"></div>
            
            <h2>✅ APPROVED GAMES</h2>
            <div id="approvedList"></div>
        </div>
    </div>

    <!-- Test Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <script>
        // ==================== LOGIN ====================
        function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (user === 'admin' && pass === 'minibossx2026') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadGames();
                sessionStorage.setItem('admin', 'loggedin');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            sessionStorage.removeItem('admin');
        }
        
        // Check login status
        window.onload = function() {
            if (sessionStorage.getItem('admin') === 'loggedin') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            }
            loadGames();
        };
        
        // ==================== GAME FUNCTIONS ====================
        function testGame(html) {
            if (!html) {
                alert('No game content');
                return;
            }
            document.getElementById('gameFrame').srcdoc = html;
            document.getElementById('gameModal').style.display = 'block';
        }
        
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').srcdoc = '';
        }
        
        function approveGame(index) {
            const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
            const game = pending[index];
            
            if (!game || !game.fileContent) {
                alert('Error: No game file');
                return;
            }
            
            // Create approved game - ONLY store metadata, HTML is separate
            const approvedGame = {
                id: Date.now(),
                name: game.gameName,
                developer: game.developerName,
                description: game.description,
                category: game.category,
                platform: game.platform,
                html: game.fileContent  // HTML is in its own field
            };
            
            // Save to approved
            const approved = JSON.parse(localStorage.getItem('approved_games')) || [];
            approved.push(approvedGame);
            localStorage.setItem('approved_games', JSON.stringify(approved));
            
            // Remove from pending
            pending.splice(index, 1);
            localStorage.setItem('pending_games', JSON.stringify(pending));
            
            loadGames();
            alert('Game approved!');
        }
        
        function rejectGame(index) {
            if (!confirm('Reject this game?')) return;
            const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
            pending.splice(index, 1);
            localStorage.setItem('pending_games', JSON.stringify(pending));
            loadGames();
        }
        
        function removeGame(index) {
            if (!confirm('Remove this game?')) return;
            const approved = JSON.parse(localStorage.getItem('approved_games')) || [];
            approved.splice(index, 1);
            localStorage.setItem('approved_games', JSON.stringify(approved));
            loadGames();
        }
        
        function loadGames() {
            // Load pending
            const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
            const pendingDiv = document.getElementById('pendingList');
            
            if (pending.length === 0) {
                pendingDiv.innerHTML = '<div class="no-items">✨ No pending games</div>';
            } else {
                let html = '';
                pending.forEach((game, i) => {
                    html += `
                        <div class="game-card">
                            <h3>${escapeHtml(game.gameName)}</h3>
                            <div class="info"><strong>Developer:</strong> ${escapeHtml(game.developerName)}</div>
                            <div class="info"><strong>Email:</strong> ${escapeHtml(game.email)}</div>
                            <div class="info"><strong>Category:</strong> ${escapeHtml(game.category)}</div>
                            <div class="info"><strong>Platform:</strong> ${escapeHtml(game.platform)}</div>
                            <div class="info"><strong>Description:</strong> ${escapeHtml(game.description)}</div>
                            <div class="buttons">
                                <button class="btn" onclick='testGame(${JSON.stringify(game.fileContent)})'>TEST</button>
                                <button class="btn btn-approve" onclick="approveGame(${i})">APPROVE</button>
                                <button class="btn" onclick="rejectGame(${i})">REJECT</button>
                            </div>
                        </div>
                    `;
                });
                pendingDiv.innerHTML = html;
            }
            
            // Load approved
            const approved = JSON.parse(localStorage.getItem('approved_games')) || [];
            const approvedDiv = document.getElementById('approvedList');
            
            if (approved.length === 0) {
                approvedDiv.innerHTML = '<div class="no-items">📭 No approved games</div>';
            } else {
                let html = '';
                approved.forEach((game, i) => {
                    html += `
                        <div class="game-card">
                            <h3>${escapeHtml(game.name)}</h3>
                            <div class="info"><strong>Developer:</strong> ${escapeHtml(game.developer)}</div>
                            <div class="info"><strong>Category:</strong> ${escapeHtml(game.category)}</div>
                            <div class="info"><strong>Platform:</strong> ${escapeHtml(game.platform)}</div>
                            <div class="info"><strong>Description:</strong> ${escapeHtml(game.description)}</div>
                            <div class="buttons">
                                <button class="btn" onclick='testGame(${JSON.stringify(game.html)})'>TEST</button>
                                <button class="btn" onclick="removeGame(${i})">REMOVE</button>
                            </div>
                        </div>
                    `;
                });
                approvedDiv.innerHTML = html;
            }
        }
        
        // Helper to prevent HTML injection
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
