<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MiniBOSSX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #8B0000;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0 40px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background: #8B0000;
            color: black;
        }
        
        /* Login Screen */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border: 2px solid #8B0000;
            border-radius: 15px;
            text-align: center;
        }
        
        .login-container h2 {
            margin-bottom: 30px;
        }
        
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .login-btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .error-msg {
            color: #ff0000;
            margin-top: 10px;
            display: none;
        }
        
        /* Admin Panel */
        .admin-panel {
            display: none;
        }
        
        h2 {
            margin: 30px 0 20px;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 10px;
        }
        
        .pending-game, .approved-game {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(139, 0, 0, 0.05);
        }
        
        .game-detail {
            color: #ccc;
            margin-bottom: 5px;
        }
        
        .game-detail strong {
            color: #8B0000;
            width: 100px;
            display: inline-block;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: 2px solid #8B0000;
            background: transparent;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            flex: 1;
        }
        
        .btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .btn-approve {
            background: #8B0000;
            color: black;
        }
        
        .btn-test {
            background: #333;
        }
        
        .logout-btn {
            float: right;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 3px;
        }
        
        /* Game Test Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
        }
        
        .game-modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            margin: 2% auto;
            background: black;
            border: 2px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
        }
        
        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #8B0000;
            font-size: 30px;
            cursor: pointer;
        }
        
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        
        .no-items {
            text-align: center;
            padding: 40px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            color: #666;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h2>🔐 ADMIN LOGIN</h2>
        <input type="text" id="username" class="login-input" placeholder="Username" value="admin">
        <input type="password" id="password" class="login-input" placeholder="Password" value="minibossx2026">
        <button class="login-btn" onclick="login()">LOGIN</button>
        <div id="loginError" class="error-msg">Invalid username or password</div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
            <h1>⚡ ADMIN PANEL ⚡</h1>
            
            <div class="nav-bar">
                <a href="index.html">HOME</a>
                <a href="submit.html">SUBMIT</a>
                <a href="admin.html">ADMIN</a>
            </div>
            
            <h2>📥 PENDING GAMES</h2>
            <div id="pendingList"></div>
            
            <h2>✅ APPROVED GAMES</h2>
            <div id="approvedList"></div>
        </div>
    </div>

    <!-- Game Test Modal -->
    <div id="gameModal" class="game-modal">
        <div class="game-modal-content">
            <span class="close-modal" onclick="closeGame()">&times;</span>
            <iframe id="gameFrame" class="game-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <script>
        // ==================== LOGIN ====================
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "minibossx2026";
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginError').style.display = 'none';
                loadPending();
                loadApproved();
                sessionStorage.setItem('adminLoggedIn', 'true');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            sessionStorage.removeItem('adminLoggedIn');
        }
        
        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadPending();
                loadApproved();
            }
        };
        
        // ==================== GAME FUNCTIONS ====================
        function testGame(htmlContent) {
            if (!htmlContent) {
                alert('No game content');
                return;
            }
            document.getElementById('gameFrame').srcdoc = htmlContent;
            document.getElementById('gameModal').style.display = 'block';
        }
        
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').srcdoc = '';
        }
        
        function approveGame(index) {
            const pending = JSON.parse(localStorage.getItem('minibossx_pending')) || [];
            const game = pending[index];
            
            if (!game || !game.fileContent) {
                alert('Error: Game file content missing');
                return;
            }
            
            // Create approved game - use SIMPLE field names
            const approvedGame = {
                id: Date.now(),
                name: game.gameName,
                developer: game.developerName,
                description: game.gameDescription,
                category: game.gameCategory,
                platform: game.gamePlatform,
                html: game.fileContent  // Store as 'html' not 'htmlContent'
            };
            
            // Save to approved
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            approved.push(approvedGame);
            localStorage.setItem('minibossx_approved', JSON.stringify(approved));
            
            // Remove from pending
            pending.splice(index, 1);
            localStorage.setItem('minibossx_pending', JSON.stringify(pending));
            
            loadPending();
            loadApproved();
            alert('Game approved!');
        }
        
        function rejectGame(index) {
            if (!confirm('Reject?')) return;
            const pending = JSON.parse(localStorage.getItem('minibossx_pending')) || [];
            pending.splice(index, 1);
            localStorage.setItem('minibossx_pending', JSON.stringify(pending));
            loadPending();
        }
        
        function removeGame(index) {
            if (!confirm('Remove?')) return;
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            approved.splice(index, 1);
            localStorage.setItem('minibossx_approved', JSON.stringify(approved));
            loadApproved();
        }
        
        function loadPending() {
            const pending = JSON.parse(localStorage.getItem('minibossx_pending')) || [];
            const list = document.getElementById('pendingList');
            
            if (pending.length === 0) {
                list.innerHTML = '<div class="no-items">✨ No pending submissions</div>';
                return;
            }
            
            let html = '';
            pending.forEach((game, index) => {
                html += `
                    <div class="pending-game">
                        <h3>${game.gameName || 'Untitled'}</h3>
                        <div class="game-detail"><strong>Developer:</strong> ${game.developerName}</div>
                        <div class="game-detail"><strong>Email:</strong> ${game.developerEmail}</div>
                        <div class="game-detail"><strong>Category:</strong> ${game.gameCategory}</div>
                        <div class="game-detail"><strong>Platform:</strong> ${game.gamePlatform}</div>
                        <div class="game-detail"><strong>Description:</strong> ${game.gameDescription}</div>
                        <div class="button-group">
                            <button class="btn btn-test" onclick='testGame(${JSON.stringify(game.fileContent)})'>TEST</button>
                            <button class="btn btn-approve" onclick="approveGame(${index})">APPROVE</button>
                            <button class="btn" onclick="rejectGame(${index})">REJECT</button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }
        
        function loadApproved() {
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            const list = document.getElementById('approvedList');
            
            if (approved.length === 0) {
                list.innerHTML = '<div class="no-items">📭 No approved games</div>';
                return;
            }
            
            let html = '';
            approved.forEach((game, index) => {
                html += `
                    <div class="pending-game">
                        <h3>${game.name || 'Untitled'}</h3>
                        <div class="game-detail"><strong>Developer:</strong> ${game.developer}</div>
                        <div class="game-detail"><strong>Category:</strong> ${game.category}</div>
                        <div class="game-detail"><strong>Platform:</strong> ${game.platform}</div>
                        <div class="game-detail"><strong>Description:</strong> ${game.description}</div>
                        <div class="button-group">
                            <button class="btn btn-test" onclick='testGame(${JSON.stringify(game.html)})'>TEST</button>
                            <button class="btn" onclick="removeGame(${index})">REMOVE</button>
                        </div>
                    </div>
                `;
            });
            list.innerHTML = html;
        }
    </script>
</body>
</html>
