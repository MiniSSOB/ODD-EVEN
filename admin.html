<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MiniBOSSX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 3rem;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0 40px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background: #8B0000;
            color: black;
        }
        
        /* Login Screen */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border: 2px solid #8B0000;
            border-radius: 15px;
            background: rgba(139, 0, 0, 0.05);
            text-align: center;
        }
        
        .login-container h2 {
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .login-btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .error-msg {
            color: #ff0000;
            margin-top: 10px;
            display: none;
        }
        
        /* Admin Panel */
        .admin-panel {
            display: none;
        }
        
        h2 {
            margin: 30px 0 20px;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 10px;
        }
        
        .game-card {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(139, 0, 0, 0.05);
        }
        
        .game-card h3 {
            color: #8B0000;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .game-detail {
            color: #ccc;
            margin-bottom: 5px;
        }
        
        .game-detail strong {
            color: #8B0000;
            width: 100px;
            display: inline-block;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: 2px solid #8B0000;
            background: transparent;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
            flex: 1;
        }
        
        .btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .btn-approve {
            background: #8B0000;
            color: black;
        }
        
        .btn-test {
            background: #333;
        }
        
        .logout-btn {
            float: right;
            padding: 8px 20px;
            background: transparent;
            border: 1px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .logout-btn:hover {
            background: #8B0000;
            color: black;
        }
        
        /* Game Test Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
        }
        
        .game-modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            margin: 2% auto;
            background-color: black;
            border: 2px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
        }
        
        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #8B0000;
            font-size: 30px;
            cursor: pointer;
        }
        
        .close-modal:hover {
            color: #ff0000;
        }
        
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        .no-items {
            text-align: center;
            padding: 40px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            color: #666;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h2>🔐 ADMIN LOGIN</h2>
        <input type="text" id="username" class="login-input" placeholder="Username" value="admin">
        <input type="password" id="password" class="login-input" placeholder="Password" value="minibossx2026">
        <button class="login-btn" onclick="login()">LOGIN</button>
        <div id="loginError" class="error-msg">Invalid username or password</div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
            <h1>⚡ ADMIN PANEL ⚡</h1>
            
            <div class="nav-bar">
                <a href="index.html">HOME</a>
                <a href="submit.html">SUBMIT</a>
                <a href="admin.html">ADMIN</a>
            </div>
            
            <h2>📥 PENDING GAMES</h2>
            <div id="pendingList"></div>
            
            <h2>✅ APPROVED GAMES</h2>
            <div id="approvedList"></div>
        </div>
    </div>

    <!-- Game Test Modal -->
    <div id="gameModal" class="game-modal">
        <div class="game-modal-content">
            <span class="close-modal" onclick="closeGame()">&times;</span>
            <iframe id="gameFrame" class="game-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <script>
        // ==================== LOGIN SYSTEM ====================
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "minibossx2026";
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginError').style.display = 'none';
                
                loadGames();
                
                sessionStorage.setItem('adminLoggedIn', 'true');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            sessionStorage.removeItem('adminLoggedIn');
        }
        
        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
            }
            loadGames();
        };
        
        // ==================== GAME FUNCTIONS ====================
        function testGame(htmlContent) {
            if (!htmlContent) {
                alert('No game content to test');
                return;
            }
            const frame = document.getElementById('gameFrame');
            const modal = document.getElementById('gameModal');
            frame.srcdoc = htmlContent;
            modal.style.display = 'block';
        }
        
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').srcdoc = '';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                closeGame();
            }
        };
        
        function approveGame(index) {
            const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
            const game = pending[index];
            
            if (!game || !game.fileContent) {
                alert('Error: Game file content missing');
                return;
            }
            
            // Create approved game
            const approvedGame = {
                id: Date.now(),
                name: game.gameName,
                developer: game.developerName,
                description: game.description,
                category: game.category,
                platform: game.platform,
                html: game.fileContent,
                dateApproved: new Date().toLocaleString()
            };
            
            // Add to approved
            const approved = JSON.parse(localStorage.getItem('approved_games')) || [];
            approved.push(approvedGame);
            localStorage.setItem('approved_games', JSON.stringify(approved));
            
            // Remove from pending
            pending.splice(index, 1);
            localStorage.setItem('pending_games', JSON.stringify(pending));
            
            loadGames();
            alert('Game approved!');
        }
        
        function rejectGame(index) {
            if (!confirm('Reject this game?')) return;
            const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
            pending.splice(index, 1);
            localStorage.setItem('pending_games', JSON.stringify(pending));
            loadGames();
        }
        
        function removeGame(index) {
            if (!confirm('Remove this game?')) return;
            const approved = JSON.parse(localStorage.getItem('approved_games')) || [];
            approved.splice(index, 1);
            localStorage.setItem('approved_games', JSON.stringify(approved));
            loadGames();
        }
        
        // Helper function to safely encode HTML content for onclick
        function encodeForOnClick(html) {
            if (!html) return '';
            // Convert the HTML to a base64 string to avoid quote issues
            return btoa(unescape(encodeURIComponent(html)));
        }
        
        function loadGames() {
            // Load pending games
            const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
            const pendingList = document.getElementById('pendingList');
            
            if (pending.length === 0) {
                pendingList.innerHTML = '<div class="no-items">✨ No pending submissions</div>';
            } else {
                let html = '';
                pending.forEach((game, index) => {
                    // Safely encode the HTML content
                    const encodedContent = encodeForOnClick(game.fileContent || '');
                    
                    html += `
                        <div class="game-card">
                            <h3>${escapeHtml(game.gameName || 'Untitled')}</h3>
                            <div class="game-detail"><strong>Developer:</strong> ${escapeHtml(game.developerName || 'Unknown')}</div>
                            <div class="game-detail"><strong>Email:</strong> ${escapeHtml(game.email || 'No email')}</div>
                            <div class="game-detail"><strong>Category:</strong> ${escapeHtml(game.category || 'OTHER')}</div>
                            <div class="game-detail"><strong>Platform:</strong> ${escapeHtml(game.platform || 'BOTH')}</div>
                            <div class="game-detail"><strong>Description:</strong> ${escapeHtml(game.description || 'No description')}</div>
                            <div class="button-group">
                                <button class="btn btn-test" onclick="testGame(atob('${encodedContent}'))">TEST</button>
                                <button class="btn btn-approve" onclick="approveGame(${index})">APPROVE</button>
                                <button class="btn" onclick="rejectGame(${index})">REJECT</button>
                            </div>
                        </div>
                    `;
                });
                pendingList.innerHTML = html;
            }
            
            // Load approved games
            const approved = JSON.parse(localStorage.getItem('approved_games')) || [];
            const approvedList = document.getElementById('approvedList');
            
            if (approved.length === 0) {
                approvedList.innerHTML = '<div class="no-items">📭 No approved games</div>';
            } else {
                let html = '';
                approved.forEach((game, index) => {
                    // Safely encode the HTML content
                    const encodedContent = encodeForOnClick(game.html || '');
                    
                    html += `
                        <div class="game-card">
                            <h3>${escapeHtml(game.name || 'Untitled')}</h3>
                            <div class="game-detail"><strong>Developer:</strong> ${escapeHtml(game.developer || 'Unknown')}</div>
                            <div class="game-detail"><strong>Category:</strong> ${escapeHtml(game.category || 'OTHER')}</div>
                            <div class="game-detail"><strong>Platform:</strong> ${escapeHtml(game.platform || 'BOTH')}</div>
                            <div class="game-detail"><strong>Description:</strong> ${escapeHtml(game.description || 'No description')}</div>
                            <div class="button-group">
                                <button class="btn btn-test" onclick="testGame(atob('${encodedContent}'))">TEST</button>
                                <button class="btn" onclick="removeGame(${index})">REMOVE</button>
                            </div>
                        </div>
                    `;
                });
                approvedList.innerHTML = html;
            }
        }
        
        // Helper function to escape HTML special characters
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
    </script>
</body>
</html>
