<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - MiniBOSSX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: #8B0000;
            font-size: 3rem;
            text-align: center;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0 40px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background: #8B0000;
            color: black;
        }
        
        /* Login Screen */
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            border: 2px solid #8B0000;
            border-radius: 15px;
            background: rgba(139, 0, 0, 0.05);
            text-align: center;
        }
        
        .login-container h2 {
            color: #8B0000;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .login-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
            font-size: 1rem;
        }
        
        .login-input:focus {
            outline: none;
            box-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }
        
        .login-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .login-btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .error-msg {
            color: #ff0000;
            margin-top: 10px;
            display: none;
        }
        
        /* Admin Panel (hidden by default) */
        .admin-panel {
            display: none;
        }
        
        h2 {
            color: #8B0000;
            margin: 30px 0 20px;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 10px;
        }
        
        .pending-game {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            background: rgba(139, 0, 0, 0.05);
        }
        
        .pending-game h3 {
            color: #8B0000;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .game-detail {
            color: #ccc;
            margin-bottom: 5px;
        }
        
        .game-detail strong {
            color: #8B0000;
            width: 100px;
            display: inline-block;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 10px 20px;
            border: 2px solid #8B0000;
            background: transparent;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            font-size: 1rem;
            flex: 1;
        }
        
        .btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .btn-approve {
            background: #8B0000;
            color: black;
        }
        
        .approved-game {
            border: 1px solid #333;
            border-radius: 5px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .remove-btn {
            color: #8B0000;
            background: transparent;
            border: 1px solid #8B0000;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .no-pending {
            text-align: center;
            padding: 60px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            color: #666;
        }
        
        .quick-add {
            border: 1px solid #8B0000;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
        }
        
        .quick-add input, .quick-add textarea, .quick-add select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
        }
        
        .file-upload-area {
            border: 2px dashed #8B0000;
            padding: 20px;
            text-align: center;
            margin-bottom: 10px;
            cursor: pointer;
        }
        
        .file-upload-area:hover {
            background: rgba(139, 0, 0, 0.1);
        }
        
        .code-paste-area {
            margin-top: 20px;
        }
        
        .code-paste-area textarea {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
            font-family: monospace;
            height: 200px;
        }
        
        .logout-btn {
            float: right;
            padding: 8px 15px;
            background: transparent;
            border: 1px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 3px;
        }
        
        .logout-btn:hover {
            background: #8B0000;
            color: black;
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <h2>🔐 ADMIN LOGIN</h2>
        <input type="text" id="username" class="login-input" placeholder="Username" value="admin">
        <input type="password" id="password" class="login-input" placeholder="Password">
        <button class="login-btn" onclick="login()">LOGIN</button>
        <div id="loginError" class="error-msg">Invalid username or password</div>
    </div>

    <!-- Admin Panel (hidden initially) -->
    <div id="adminPanel" class="admin-panel">
        <div class="container">
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
            <h1>⚡ ADMIN PANEL ⚡</h1>
            
            <div class="nav-bar">
                <a href="index.html">HOME</a>
                <a href="submit.html">SUBMIT</a>
                <a href="admin.html">ADMIN</a>
            </div>
            
            <h2>📥 PENDING GAMES</h2>
            <div id="pendingList">
                <div class="no-pending">✨ No pending submissions</div>
            </div>
            
            <h2>✅ APPROVED GAMES</h2>
            <div id="approvedList">
                <div class="no-pending">📭 No approved games</div>
            </div>
            
            <h2>➕ QUICK ADD GAME</h2>
            
            <!-- Method 1: Upload HTML File -->
            <div class="quick-add">
                <h3 style="margin-bottom: 15px;">📁 Method 1: Upload HTML File</h3>
                <input type="text" id="quickName" placeholder="Game Name">
                <input type="text" id="quickDev" placeholder="Developer Name">
                <textarea id="quickDesc" placeholder="Description"></textarea>
                <select id="quickCat">
                    <option value="ACTION">Action</option>
                    <option value="PUZZLE">Puzzle</option>
                    <option value="ARCADE">Arcade</option>
                    <option value="OTHER">Other</option>
                </select>
                <select id="quickPlatform">
                    <option value="DESKTOP">Desktop</option>
                    <option value="MOBILE">Mobile</option>
                    <option value="BOTH">Both</option>
                </select>
                
                <div class="file-upload-area" onclick="document.getElementById('htmlFile').click()">
                    📂 Click to select HTML file
                    <input type="file" id="htmlFile" accept=".html,.htm" style="display: none;" onchange="handleFileSelect(this)">
                </div>
                <div id="fileName" style="color: #ccc; margin-bottom: 10px;"></div>
                
                <button class="btn btn-approve" onclick="addGameFromFile()" style="width:100%">ADD GAME FROM FILE</button>
            </div>
            
            <!-- Method 2: Paste HTML Code -->
            <div class="quick-add">
                <h3 style="margin-bottom: 15px;">⌨️ Method 2: Paste HTML Code</h3>
                <input type="text" id="quickName2" placeholder="Game Name">
                <input type="text" id="quickDev2" placeholder="Developer Name">
                <textarea id="quickDesc2" placeholder="Description"></textarea>
                <select id="quickCat2">
                    <option value="ACTION">Action</option>
                    <option value="PUZZLE">Puzzle</option>
                    <option value="ARCADE">Arcade</option>
                    <option value="OTHER">Other</option>
                </select>
                <select id="quickPlatform2">
                    <option value="DESKTOP">Desktop</option>
                    <option value="MOBILE">Mobile</option>
                    <option value="BOTH">Both</option>
                </select>
                
                <div class="code-paste-area">
                    <textarea id="htmlCode" placeholder="Paste your HTML code here..."></textarea>
                </div>
                
                <button class="btn btn-approve" onclick="addGameFromCode()" style="width:100%">ADD GAME FROM CODE</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== LOGIN SYSTEM ====================
        // Set your username and password here (change these)
        const ADMIN_USER = "admin";
        const ADMIN_PASS = "minibossx2026";
        
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginError').style.display = 'none';
                
                // Load data
                loadPending();
                loadApproved();
                
                // Save login state
                sessionStorage.setItem('adminLoggedIn', 'true');
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }
        
        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            sessionStorage.removeItem('adminLoggedIn');
        }
        
        // Check if already logged in
        window.onload = function() {
            if (sessionStorage.getItem('adminLoggedIn') === 'true') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadPending();
                loadApproved();
            }
        };
        
        // ==================== GAME MANAGEMENT ====================
        let selectedFile = null;
        
        function handleFileSelect(input) {
            selectedFile = input.files[0];
            document.getElementById('fileName').textContent = selectedFile ? `Selected: ${selectedFile.name}` : '';
        }
        
        function addGameFromFile() {
            if (!selectedFile) {
                alert('Please select an HTML file first');
                return;
            }
            
            const gameName = document.getElementById('quickName').value;
            const developer = document.getElementById('quickDev').value;
            const description = document.getElementById('quickDesc').value;
            const category = document.getElementById('quickCat').value;
            const platform = document.getElementById('quickPlatform').value;
            
            if (!gameName || !developer || !description) {
                alert('Please fill in all fields');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const htmlContent = e.target.result;
                
                const game = {
                    id: Date.now(),
                    name: gameName,
                    developer: developer,
                    description: description,
                    category: category,
                    platform: platform,
                    htmlContent: htmlContent,
                    dateApproved: new Date().toLocaleString()
                };
                
                saveGame(game);
            };
            
            reader.readAsText(selectedFile);
        }
        
        function addGameFromCode() {
            const gameName = document.getElementById('quickName2').value;
            const developer = document.getElementById('quickDev2').value;
            const description = document.getElementById('quickDesc2').value;
            const category = document.getElementById('quickCat2').value;
            const platform = document.getElementById('quickPlatform2').value;
            const htmlCode = document.getElementById('htmlCode').value;
            
            if (!gameName || !developer || !description || !htmlCode) {
                alert('Please fill in all fields and paste HTML code');
                return;
            }
            
            const game = {
                id: Date.now(),
                name: gameName,
                developer: developer,
                description: description,
                category: category,
                platform: platform,
                htmlContent: htmlCode,
                dateApproved: new Date().toLocaleString()
            };
            
            saveGame(game);
        }
        
        function saveGame(game) {
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            approved.push(game);
            localStorage.setItem('minibossx_approved', JSON.stringify(approved));
            
            // Clear form
            document.getElementById('quickName').value = '';
            document.getElementById('quickDev').value = '';
            document.getElementById('quickDesc').value = '';
            document.getElementById('htmlFile').value = '';
            document.getElementById('fileName').textContent = '';
            selectedFile = null;
            
            document.getElementById('quickName2').value = '';
            document.getElementById('quickDev2').value = '';
            document.getElementById('quickDesc2').value = '';
            document.getElementById('htmlCode').value = '';
            
            loadApproved();
            alert('Game added successfully!');
        }
        
        function approveGame(index) {
            const pending = JSON.parse(localStorage.getItem('minibossx_pending')) || [];
            const game = pending[index];
            
            const approvedGame = {
                id: Date.now(),
                name: game.gameName,
                developer: game.developerName,
                description: game.gameDescription,
                category: game.gameCategory,
                platform: game.gamePlatform,
                htmlContent: null,
                dateApproved: new Date().toLocaleString()
            };
            
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            approved.push(approvedGame);
            localStorage.setItem('minibossx_approved', JSON.stringify(approved));
            
            pending.splice(index, 1);
            localStorage.setItem('minibossx_pending', JSON.stringify(pending));
            
            loadPending();
            loadApproved();
            
            alert('Game approved! You can now add the HTML file or code in the Quick Add section.');
        }
        
        function rejectGame(index) {
            if (!confirm('Reject this game?')) return;
            const pending = JSON.parse(localStorage.getItem('minibossx_pending')) || [];
            pending.splice(index, 1);
            localStorage.setItem('minibossx_pending', JSON.stringify(pending));
            loadPending();
        }
        
        function removeGame(index) {
            if (!confirm('Remove this game?')) return;
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            approved.splice(index, 1);
            localStorage.setItem('minibossx_approved', JSON.stringify(approved));
            loadApproved();
        }
        
        function loadPending() {
            const pending = JSON.parse(localStorage.getItem('minibossx_pending')) || [];
            const list = document.getElementById('pendingList');
            
            if (pending.length === 0) {
                list.innerHTML = '<div class="no-pending">✨ No pending submissions</div>';
                return;
            }
            
            let html = '';
            pending.forEach((game, index) => {
                html += `
                    <div class="pending-game">
                        <h3>${game.gameName}</h3>
                        <div class="game-detail"><strong>Developer:</strong> ${game.developerName}</div>
                        <div class="game-detail"><strong>Email:</strong> ${game.developerEmail}</div>
                        <div class="game-detail"><strong>Category:</strong> ${game.gameCategory}</div>
                        <div class="game-detail"><strong>Platform:</strong> ${game.gamePlatform}</div>
                        <div class="game-detail"><strong>Description:</strong> ${game.gameDescription}</div>
                        <div class="game-detail"><strong>Download Link:</strong> <a href="${game.gameLink}" target="_blank" style="color:#8B0000;">View File</a></div>
                        <div class="button-group">
                            <button class="btn btn-approve" onclick="approveGame(${index})">✓ APPROVE</button>
                            <button class="btn" onclick="rejectGame(${index})">✗ REJECT</button>
                        </div>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
        
        function loadApproved() {
            const approved = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            const list = document.getElementById('approvedList');
            
            if (approved.length === 0) {
                list.innerHTML = '<div class="no-pending">📭 No approved games</div>';
                return;
            }
            
            let html = '';
            approved.forEach((game, index) => {
                html += `
                    <div class="approved-game">
                        <span><strong>${game.name}</strong> by ${game.developer}</span>
                        <button class="remove-btn" onclick="removeGame(${index})">REMOVE</button>
                    </div>
                `;
            });
            
            list.innerHTML = html;
        }
    </script>
</body>
</html>
