<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MiniSSOB • Global Gold Stats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c07; font-family: 'Inter', system-ui, monospace; padding: 2rem 1.2rem; color: #ede9cf; }
    .container { max-width: 1000px; margin: 0 auto; }
    .back-link { display: inline-block; margin-bottom: 1rem; color: #d4af37; text-decoration: none; font-size: 0.8rem; }
    .back-link:hover { text-decoration: underline; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #f3e0a4, #d6af40); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { color: #b9ae7a; font-size: 0.8rem; margin-bottom: 1.5rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: #1e2118; border-radius: 1rem; padding: 1rem; text-align: center; border: 1px solid #3a3c2a; }
    .stat-label { font-size: 0.7rem; color: #b9ae7a; letter-spacing: 1px; }
    .stat-value { font-size: 1.5rem; font-weight: 800; color: #d4af37; font-family: monospace; }
    .players-table { background: #12140e; border-radius: 1rem; overflow: hidden; border: 1px solid #3a3c2a; }
    .table-header { display: grid; grid-template-columns: 80px 1fr 1fr; background: #202217; padding: 0.8rem 1rem; font-weight: 700; font-size: 0.7rem; color: #e9d58b; }
    .player-row { display: grid; grid-template-columns: 80px 1fr 1fr; padding: 0.6rem 1rem; border-bottom: 1px solid #26291c; font-size: 0.8rem; }
    .player-row:hover { background: #1c1f16; }
    .loading { text-align: center; padding: 2rem; color: #8b8a5a; }
    .refresh-btn { background: #d4af37; border: none; padding: 6px 16px; border-radius: 2rem; font-weight: 700; cursor: pointer; color: #0a0c07; margin-top: 1rem; }
    .footer { margin-top: 2rem; font-size: 0.7rem; text-align: center; color: #6e6a4a; }
  </style>
</head>
<body>
<div class="container">
  <a href="index.html" class="back-link">← Back to Hub</a>
  <h1>📊 GLOBAL GOLD STATISTICS</h1>
  <div class="sub">Anonymous player data • All gold purchases tracked</div>

  <div class="stats-grid">
    <div class="stat-card"><div class="stat-label">TOTAL GOLD BOUGHT</div><div class="stat-value" id="totalBought">-</div></div>
    <div class="stat-card"><div class="stat-label">ACTIVE PLAYERS</div><div class="stat-value" id="activePlayers">-</div></div>
  </div>

  <div class="players-table">
    <div class="table-header">
      <span>RANK</span>
      <span>PLAYER</span>
      <span>🟢 GOLD BOUGHT</span>
    </div>
    <div id="playersList" class="loading">Loading anonymous player data...</div>
  </div>

  <div style="text-align: center; margin-top: 1rem;">
    <button class="refresh-btn" onclick="loadStats()">⟳ REFRESH DATA</button>
  </div>
  <div class="footer">All players are anonymous • Data updates when players buy gold</div>
</div>

<script>
  // YOUR GOOGLE APPS SCRIPT URL - already pasted
  const API_URL = "https://script.google.com/macros/s/AKfycbx3qsZhd5XqGVQupA_SPg5bNwzSVzHwmE6_IDNA1jVm7Wz4SbGDe_hDaM4/exec";
  
  function formatNumber(num) {
    if(num >= 1000000) return (num/1000000).toFixed(2) + "M";
    if(num >= 1000) return (num/1000).toFixed(2) + "K";
    return num.toString();
  }
  
  async function loadStats() {
    document.getElementById('playersList').innerHTML = '<div class="loading">Loading anonymous player data...</div>';
    
    try {
      const response = await fetch(API_URL);
      const data = await response.json();
      
      document.getElementById('totalBought').innerHTML = formatNumber(data.totalBought);
      document.getElementById('activePlayers').innerHTML = data.activePlayers;
      
      let playersHtml = '';
      if(data.players && data.players.length > 0) {
        for(let i = 0; i < data.players.length; i++) {
          const p = data.players[i];
          playersHtml += `
            <div class="player-row">
              <span>#${i+1}</span>
              <span>🕵️ ${p.id}</span>
              <span style="color:#aaffaa;">${formatNumber(p.bought)}</span>
            </div>
          `;
        }
      } else {
        playersHtml = '<div class="loading">No player data yet. Be the first to buy gold!</div>';
      }
      
      document.getElementById('playersList').innerHTML = playersHtml;
    } catch(e) {
      document.getElementById('playersList').innerHTML = '<div class="loading">Error loading stats. Check console.</div>';
      console.error(e);
    }
  }
  
  loadStats();
</script>
</body>
</html>
