<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MiniSSOB Games • Bullet Calculator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c07;
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', monospace;
      padding: 2rem 1.2rem;
      color: #ede9cf;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f3e0a4, #d6af40);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: #b9ae7a;
      font-size: 0.85rem;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .tool-card {
      background: #14170f;
      border: 1px solid #3a3c2a;
      border-radius: 1.5rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .tool-card:hover {
      border-color: #d4af37;
      transform: translateY(-4px);
      background: #1a1d14;
    }

    .tool-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .tool-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f3e0a4;
      margin-bottom: 0.5rem;
    }

    .tool-desc {
      font-size: 0.75rem;
      color: #8b8a5a;
    }

    .active-tool-panel {
      background: #12140e;
      border-radius: 1.5rem;
      border: 1px solid #4e482a;
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .panel-header {
      background: #1e2118;
      padding: 0.8rem 1.2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #3a3c2a;
    }

    .panel-title {
      font-weight: 700;
      color: #d4af37;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: #b9ae7a;
      padding: 4px 12px;
      border-radius: 2rem;
    }

    .close-btn:hover {
      background: #2a2c1f;
      color: #ff8888;
    }

    .tool-content {
      padding: 1.5rem;
      display: none;
    }

    .tool-content.active {
      display: block;
    }

    .counter-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
      padding: 12px;
      background: #1a1d14;
      border-radius: 2rem;
      border: 1px solid #4e482a;
      font-family: monospace;
    }

    .counter-number {
      font-size: 1.5rem;
      font-weight: 800;
      color: #d4af37;
    }

    .counter-label {
      font-size: 0.7rem;
      color: #b9ae7a;
      letter-spacing: 1px;
    }

    .footer {
      margin-top: 1rem;
      font-size: 0.7rem;
      text-align: center;
      color: #6e6a4a;
    }

    @media (max-width: 650px) {
      .tools-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎮 MINISSOB GAMES</h1>
    <div class="sub">Select a tool below</div>
  </div>

  <div class="tools-grid">
    <div class="tool-card" data-tool="bulletCalc">
      <div class="tool-icon">⚔️</div>
      <div class="tool-title">Bullet Price Calculator</div>
      <div class="tool-desc">Set car price • Bulk order • Tiered discounts</div>
    </div>
  </div>

  <div id="activeToolPanel" class="active-tool-panel" style="display: none;">
    <div class="panel-header">
      <span class="panel-title" id="panelTitle">Active Tool</span>
      <button class="close-btn" id="closePanelBtn">✕ CLOSE</button>
    </div>
    <div id="bulletCalcContent" class="tool-content">
      <div style="text-align: center; padding: 2rem;">Loading...</div>
    </div>
  </div>

  <div class="counter-bar">
    <span class="counter-label">👁️ TOTAL SITE VISITS</span>
    <span class="counter-number" id="visitorCount">0</span>
  </div>
  <div class="footer">
    Click the calculator above • Each line in bulk order = one car • Duplicates count separately
  </div>
</div>

<script>
  // VISITOR COUNTER
  function updateVisitorCounter() {
    let count = localStorage.getItem('bootlegger_site_visits');
    if (count === null) {
      count = 1;
    } else {
      count = parseInt(count) + 1;
    }
    localStorage.setItem('bootlegger_site_visits', count);
    document.getElementById('visitorCount').innerText = count.toLocaleString();
  }

  // BULLET CALCULATOR
  function loadBulletCalculator() {
    const container = document.getElementById('bulletCalcContent');
    
    const bulletCalcHTML = `
      <style>
        .bullet-calc-container * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        .bullet-calc-container {
          background: #12140e;
          padding: 0;
          color: #ede9cf;
        }
        .input-panel {
          background: #1e2118;
          border-radius: 1.5rem;
          padding: 1rem 1.2rem;
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          justify-content: space-between;
          gap: 1rem;
          margin-bottom: 0.8rem;
        }
        .input-group {
          display: flex;
          flex-wrap: wrap;
          align-items: baseline;
          gap: 0.8rem;
          background: #0e0f0b;
          padding: 0.8rem 1.2rem;
          border-radius: 1.5rem;
        }
        .input-group label {
          font-weight: 600;
          font-size: 0.8rem;
          color: #e0ca7c;
        }
        .price-input {
          background: #050504;
          border: 1px solid #5e5536;
          padding: 8px 14px;
          border-radius: 3rem;
          font-size: 1rem;
          font-weight: 700;
          font-family: monospace;
          color: #ffecb3;
          width: 220px;
          text-align: center;
        }
        .cost-bullet-badge {
          background: #2a2c1c;
          padding: 6px 16px;
          border-radius: 40px;
          font-family: monospace;
          font-weight: 800;
          font-size: 0.8rem;
        }
        .tier-controls {
          background: #1a1d14;
          border-radius: 1.5rem;
          padding: 1rem 1.2rem;
          margin-top: 1rem;
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          justify-content: space-between;
          gap: 1rem;
        }
        .tier-toggle {
          display: flex;
          align-items: center;
          gap: 12px;
        }
        .tier-toggle label {
          font-weight: 600;
          font-size: 0.85rem;
          color: #e0ca7c;
          cursor: pointer;
        }
        .tier-checkbox {
          width: 44px;
          height: 24px;
          appearance: none;
          background: #2a2c1f;
          border-radius: 30px;
          position: relative;
          cursor: pointer;
        }
        .tier-checkbox:checked {
          background: #d4af37;
        }
        .tier-checkbox::before {
          content: '';
          width: 20px;
          height: 20px;
          background: #fff;
          border-radius: 50%;
          position: absolute;
          top: 2px;
          left: 3px;
          transition: 0.2s;
        }
        .tier-checkbox:checked::before {
          left: 21px;
        }
        .tier-values {
          display: flex;
          flex-wrap: wrap;
          gap: 1rem;
          align-items: center;
        }
        .tier-value-group {
          display: flex;
          align-items: center;
          gap: 8px;
          background: #0e0f0b;
          padding: 5px 12px;
          border-radius: 2rem;
        }
        .tier-value-group span {
          font-size: 0.7rem;
          color: #b9ae7a;
        }
        .tier-input {
          background: #050504;
          border: 1px solid #5e5536;
          padding: 4px 8px;
          border-radius: 1.5rem;
          font-size: 0.8rem;
          font-weight: 600;
          font-family: monospace;
          color: #ffecb3;
          width: 60px;
          text-align: center;
        }
        .cars-table {
          background: #0e0f0b;
          border-radius: 1rem;
          overflow: hidden;
          margin-top: 1rem;
          max-height: 300px;
          overflow-y: auto;
        }
        .table-header {
          display: grid;
          grid-template-columns: 2fr 0.8fr 1.2fr;
          background: #202217;
          padding: 0.5rem 1rem;
          font-weight: 700;
          font-size: 0.65rem;
          color: #e9d58b;
        }
        .car-row {
          display: grid;
          grid-template-columns: 2fr 0.8fr 1.2fr;
          padding: 0.4rem 1rem;
          border-bottom: 1px solid #26291c;
          font-size: 0.75rem;
        }
        .bulk-panel {
          background: #1a1d14;
          border-radius: 1rem;
          padding: 1rem;
          margin-top: 1rem;
        }
        .bulk-textarea {
          width: 100%;
          background: #0e0f0b;
          border: 1px solid #5e5536;
          border-radius: 1rem;
          padding: 10px;
          font-family: monospace;
          font-size: 0.75rem;
          color: #ffecb3;
          resize: vertical;
          margin-bottom: 0.8rem;
        }
        .calc-btn {
          background: #d4af37;
          border: none;
          padding: 8px 20px;
          border-radius: 2rem;
          font-weight: 700;
          cursor: pointer;
          color: #0a0c07;
        }
        .stats-note {
          font-size: 0.65rem;
          margin-top: 8px;
          text-align: right;
          color: #a6a073;
        }
        .bulk-result {
          margin-top: 12px;
          background: #0e0f0b;
          padding: 10px;
          border-radius: 1rem;
        }
      </style>
      <div class="bullet-calc-container">
        <div class="input-panel">
          <span class="cost-bullet-badge">🏎️ CASTILLON V16 (675 bullets)</span>
          <div class="input-group">
            <label>💰 WHAT YOU PAY ($)</label>
            <input type="text" class="price-input car-price-input" value="300,000,000">
          </div>
          <div class="cost-bullet-badge car-per-bullet">💵 PER BULLET: $444,444</div>
        </div>

        <div class="tier-controls">
          <div class="tier-toggle">
            <label>🔪 ENABLE TIERED PRICING</label>
            <input type="checkbox" class="tier-checkbox" checked>
          </div>
          <div class="tier-values">
            <div class="tier-value-group"><span>🔴 440+ BULLETS:</span><input type="number" class="tier-input tier1-input" value="100" step="5">%</div>
            <div class="tier-value-group"><span>🟡 100-339 BULLETS:</span><input type="number" class="tier-input tier2-input" value="50" step="5">%</div>
            <div class="tier-value-group"><span>🟢 UNDER 100 BULLETS:</span><input type="number" class="tier-input tier3-input" value="30" step="5">%</div>
          </div>
        </div>

        <div class="cars-table">
          <div class="table-header">
            <span>CAR NAME</span>
            <span>BULLETS</span>
            <span>YOU PAY</span>
          </div>
          <div class="car-list-container"></div>
        </div>

        <div class="bulk-panel">
          <div style="font-weight:700; margin-bottom:8px;">📋 BULK ORDER - PASTE YOUR CAR LIST (ONE PER LINE)</div>
          <textarea class="bulk-textarea" rows="6" placeholder="Castillon V16
Castillon V16
Sweet Sixteen V16 Roadster
Braxton 8 Litre
Castillon V16
Hudson V12 Limousine"></textarea>
          <button class="calc-btn calculate-bulk">💰 CALCULATE TOTAL</button>
          <div class="bulk-result" style="display: none;">
            <div>📦 TOTAL CARS: <span class="total-cars-count">0</span></div>
            <div class="bulk-breakdown" style="margin-top: 8px;"></div>
            <div style="margin-top:8px; padding-top:6px; border-top:1px solid #d4af37;">💰 TOTAL OWED: <span class="total-owed">$0</span></div>
          </div>
        </div>
        <div class="stats-note">Each line = one car • Duplicates count separately • Matches longest names first</div>
      </div>
    `;
    
    container.innerHTML = bulletCalcHTML;
    initBulletCalculator();
  }

  function initBulletCalculator() {
    const carsRaw = [
      { name: "Sweet Sixteen V16 Roadster", bullets: 550 },
      { name: "Castillon V16 Roadster", bullets: 550 },
      { name: "Rosenberg Type RS Phaeton LaRue", bullets: 440 },
      { name: "Rosenberg Type RS Boattail Speedster", bullets: 305 },
      { name: "Clausen Royal Close Coupled Sedan", bullets: 220 },
      { name: "Everett Series R 7-Passenger Touring", bullets: 200 },
      { name: "Martinez-Bauer 431 Supercharged Roadster", bullets: 155 },
      { name: "Chalamet Alliance Phaeton", bullets: 45 },
      { name: "Chalamet Liberty 1/2 Ton Pickup", bullets: 40 },
      { name: "Porter Model 11 Touring", bullets: 40 },
      { name: "Porter Model 6 Touring", bullets: 20 },
      { name: "Porter Model 1 Tudor", bullets: 40 },
      { name: "Porter Model 1 Closed Cab", bullets: 40 },
      { name: "Harlow-Ryder Model S35", bullets: 10 },
      { name: "Auclair Type-3 GSS", bullets: 15 },
      { name: "Bernardi Model CE", bullets: 20 },
      { name: "Swift Model 96", bullets: 30 },
      { name: "Rosenberg Type-R", bullets: 340 },
      { name: "Maynard 384 Speedster", bullets: 190 },
      { name: "Maynard V12", bullets: 175 },
      { name: "Hudson V12 Limousine", bullets: 475 },
      { name: "Braxton 8 Litre", bullets: 450 },
      { name: "Castillon V16", bullets: 675 },
      { name: "Asher 26-6", bullets: 130 },
      { name: "Hearse", bullets: 110 },
      { name: "Barrett 480", bullets: 100 },
      { name: "School Bus", bullets: 40 },
      { name: "Milk Truck", bullets: 40 },
      { name: "Police Car", bullets: 40 },
      { name: "Porter V8", bullets: 40 },
      { name: "Tree Delivery Truck", bullets: 40 }
    ];
    
    const sortedCars = [...carsRaw].sort((a, b) => b.bullets - a.bullets);
    
    function formatMillions(value) {
      if (!value && value !== 0) return "0";
      let num = typeof value === 'number' ? value : parseFloat(value);
      if (isNaN(num)) return "0";
      let millions = num / 1000000;
      return millions.toFixed(2) + "M";
    }
    
    function parseCommaNumber(value) {
      if (typeof value === 'string') {
        let cleaned = value.replace(/,/g, '');
        let parsed = parseFloat(cleaned);
        return isNaN(parsed) ? 0 : parsed;
      }
      return parseFloat(value);
    }
    
    function getBasePerBullet() {
      let price = parseCommaNumber(document.querySelector('.car-price-input').value);
      if (isNaN(price) || price <= 0) price = 300000000;
      return price / 675;
    }
    
    function getMultiplier(bullets) {
      const enabled = document.querySelector('.tier-checkbox').checked;
      if (!enabled) return 1;
      const tier1 = parseFloat(document.querySelector('.tier1-input').value) / 100;
      const tier2 = parseFloat(document.querySelector('.tier2-input').value) / 100;
      const tier3 = parseFloat(document.querySelector('.tier3-input').value) / 100;
      if (bullets >= 440) return tier1;
      if (bullets >= 100 && bullets <= 339) return tier2;
      if (bullets <= 99) return tier3;
      return 1;
    }
    
    function renderCars() {
      const perBullet = getBasePerBullet();
      let html = '';
      for (let car of sortedCars) {
        const basePrice = perBullet * car.bullets;
        const multiplier = getMultiplier(car.bullets);
        const finalPrice = basePrice * multiplier;
        html += `<div class="car-row"><span>${car.name}</span><span>${car.bullets}</span><span>$${formatMillions(finalPrice)}</span></div>`;
      }
      document.querySelector('.car-list-container').innerHTML = html;
    }
    
    function updateDisplay() {
      const perBullet = getBasePerBullet();
      document.querySelector('.car-per-bullet').innerHTML = `💵 PER BULLET: $${formatMillions(perBullet)}`;
      renderCars();
    }
    
    function calculateBulk() {
      const text = document.querySelector('.bulk-textarea').value;
      const lines = text.split(/\r?\n/);
      const counts = new Map();
      
      for (let line of lines) {
        let trimmedLine = line.trim();
        if (trimmedLine === "") continue;
        
        let matched = false;
        for (let car of carsRaw) {
          if (trimmedLine.toLowerCase() === car.name.toLowerCase()) {
            counts.set(car.name, (counts.get(car.name) || 0) + 1);
            matched = true;
            break;
          }
        }
        if (!matched) {
          for (let car of carsRaw) {
            if (trimmedLine.toLowerCase().includes(car.name.toLowerCase())) {
              counts.set(car.name, (counts.get(car.name) || 0) + 1);
              break;
            }
          }
        }
      }
      
      let total = 0;
      let breakdown = '';
      const perBullet = getBasePerBullet();
      
      for (let [name, qty] of counts) {
        const car = carsRaw.find(c => c.name === name);
        const basePrice = perBullet * car.bullets;
        const price = basePrice * getMultiplier(car.bullets);
        const subtotal = price * qty;
        total += subtotal;
        breakdown += `<div style="font-size:0.7rem; margin-bottom: 2px;">${qty}x ${name}: $${formatMillions(subtotal)}</div>`;
      }
      
      let totalCars = 0;
      for (let qty of counts.values()) totalCars += qty;
      
      document.querySelector('.total-cars-count').innerHTML = totalCars;
      document.querySelector('.bulk-breakdown').innerHTML = breakdown || '<div>No cars found in your list</div>';
      document.querySelector('.total-owed').innerHTML = `$${formatMillions(total)}`;
      document.querySelector('.bulk-result').style.display = 'block';
    }
    
    document.querySelector('.car-price-input').addEventListener('input', updateDisplay);
    document.querySelector('.tier-checkbox').addEventListener('change', updateDisplay);
    document.querySelector('.tier1-input').addEventListener('input', updateDisplay);
    document.querySelector('.tier2-input').addEventListener('input', updateDisplay);
    document.querySelector('.tier3-input').addEventListener('input', updateDisplay);
    document.querySelector('.calculate-bulk').addEventListener('click', calculateBulk);
    updateDisplay();
  }

  // TOOL SELECTION
  const panel = document.getElementById('activeToolPanel');
  const panelTitle = document.getElementById('panelTitle');

  function openTool(toolId) {
    document.querySelectorAll('.tool-content').forEach(content => {
      content.classList.remove('active');
    });
    
    const selectedContent = document.getElementById(`${toolId}Content`);
    if (selectedContent) {
      selectedContent.classList.add('active');
    }
    
    panelTitle.innerText = '⚔️ Bullet Price Calculator';
    panel.style.display = 'block';
    
    if (document.getElementById('bulletCalcContent').innerHTML.includes('Loading...')) {
      loadBulletCalculator();
    }
  }

  document.querySelectorAll('.tool-card').forEach(card => {
    card.addEventListener('click', () => {
      openTool('bulletCalc');
    });
  });

  document.getElementById('closePanelBtn').addEventListener('click', () => {
    panel.style.display = 'none';
  });

  updateVisitorCounter();
</script>
</body>
</html>
