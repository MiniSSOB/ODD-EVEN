<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MiniSSOB Games • Hub</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c07;
      font-family: 'Inter', system-ui, 'Segoe UI', 'Roboto', monospace;
      padding: 2rem 1.2rem;
      color: #ede9cf;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, #f3e0a4, #d6af40);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    .sub {
      color: #b9ae7a;
      font-size: 0.85rem;
    }

    .tools-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    .tool-card {
      background: #14170f;
      border: 1px solid #3a3c2a;
      border-radius: 1.5rem;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
      text-decoration: none;
      display: block;
    }

    .tool-card:hover {
      border-color: #d4af37;
      transform: translateY(-4px);
      background: #1a1d14;
    }

    .tool-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
    }

    .tool-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: #f3e0a4;
      margin-bottom: 0.5rem;
    }

    .tool-desc {
      font-size: 0.75rem;
      color: #8b8a5a;
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      text-align: center;
      color: #6e6a4a;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🎮 MINISSOB GAMES</h1>
    <div class="sub">Select a tool below</div>
  </div>

  <div class="tools-grid">
    <a href="bullet.html" class="tool-card">
      <div class="tool-icon">⚔️</div>
      <div class="tool-title">Bullet Price Calculator</div>
      <div class="tool-desc">Set car price • Bulk order • Tiered discounts</div>
    </a>
    <a href="gold.html" class="tool-card">
      <div class="tool-icon">💎</div>
      <div class="tool-title">Gold Portfolio & Trader</div>
      <div class="tool-desc">Track buys/sells • Average cost • Sell orders</div>
    </a>
  </div>

  <div class="footer">
    Click any tool above • Your data saves locally in YOUR browser
  </div>
</div>
