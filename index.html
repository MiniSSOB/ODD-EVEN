<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Rush · arrow keys</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(145deg, #0d0d1a, #12122b);
      color: #f0f0f0;
    }
    .container {
      text-align: center;
      background: rgba(8, 8, 18, 0.95);
      backdrop-filter: blur(4px);
      padding: 2rem 2rem 2.8rem;
      border-radius: 3rem;
      box-shadow: 0 25px 40px rgba(255, 60, 65, 0.3), 0 0 0 2px #ff3c4140 inset;
      max-width: 90%;
      width: 520px;
      border: 1px solid #ff8a8c;
    }
    h1 {
      margin-bottom: 1.2rem;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #ff416c, #ff914d);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px #ff3c41;
    }
    .key-hint {
      font-size: 1.3rem;
      background: #1e1e38;
      padding: 0.5rem 1.5rem;
      border-radius: 3rem;
      display: inline-block;
      margin-bottom: 1rem;
      border: 1px solid #ffb86b;
      color: #ffdb8e;
    }
    .key-hint span {
      font-weight: bold;
      background: #2a2a4a;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      margin: 0 0.5rem;
      border: 1px solid gold;
    }
    #timer-bar {
      width: 90%;
      height: 1.3rem;
      background: #24243c;
      margin: 1.8rem auto 2.2rem;
      border-radius: 3rem;
      overflow: hidden;
      border: 2px solid #ffb86b80;
      box-shadow: 0 0 10px #ffb86b;
    }
    #timer-fill {
      height: 100%;
      background: linear-gradient(90deg, #b5ff7a, #3eff9e);
      width: 100%;
      transition: width linear;
      border-radius: 3rem;
    }
    #number-display {
      font-size: 9rem;
      font-weight: 900;
      margin: 0.5rem 0 0.2rem;
      color: #fde16d;
      text-shadow: 0 0 35px #ffb347, 0 8px 0 #9b5114;
      line-height: 1.1;
    }
    .score-display {
      font-size: 2.4rem;
      background: #1f1f35;
      display: inline-block;
      padding: 0.6rem 2.8rem;
      border-radius: 4rem;
      border: 2px solid #ffd966;
      color: #ffdb7c;
      font-weight: bold;
      margin-top: 0.2rem;
      box-shadow: 0 5px 0 #0a0a14;
    }
    .button-panel {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin: 2rem 0 1.5rem;
    }
    .button-panel button {
      flex: 1;
      padding: 1.8rem 0.5rem;
      font-size: 2.5rem;
      font-weight: bold;
      margin: 0;
      border-radius: 3rem;
      background: linear-gradient(145deg, #2d2d5a, #1c1c38);
      box-shadow: 0 10px 0 #0e0e1c, 0 15px 30px #000000b0;
      border: 2px solid #ffc107;
      color: #ffe484;
      cursor: pointer;
      transition: 0.1s ease;
      letter-spacing: 2px;
    }
    .button-panel button:hover {
      background: linear-gradient(145deg, #3d3d7a, #2c2c52);
      transform: translateY(-3px);
      box-shadow: 0 13px 0 #0e0e1c, 0 20px 35px black;
    }
    .button-panel button:active {
      transform: translateY(5px);
      box-shadow: 0 5px 0 #0e0e1c;
    }
    .key-info {
      font-size: 1.3rem;
      background: #2a2a42;
      padding: 0.5rem 2rem;
      border-radius: 3rem;
      display: inline-block;
      border: 1px solid #ffb86b;
    }
    .menu-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2rem;
    }
    .menu-buttons button {
      padding: 1.2rem 2.5rem;
      font-size: 2rem;
      min-width: 180px;
      border-radius: 4rem;
    }
    .hidden { display: none !important; }
    .instruction {
      font-size: 1.3rem;
      color: #b0b0d0;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="container" id="menu-screen">
    <h1>⚡ NUMBER RUSH</h1>
    <div class="key-hint">
      <span>← ODD</span>   <span>EVEN →</span>
    </div>
    <div style="font-size: 1.8rem; margin: 2rem 0 1rem;">🔢 odds & evens</div>
    <div class="menu-buttons">
      <button onclick="startGame()">🎮 PLAY</button>
    </div>
    <div class="instruction">use arrow keys — left = odd, right = even</div>
  </div>

  <div class="container hidden" id="game-screen">
    <div class="score-display"><span id="score">0</span></div>
    <div id="number-display">0</div>
    <div id="timer-bar"><div id="timer-fill"></div></div>
    
    <div class="button-panel">
      <button id="oddButton" onclick="checkAnswer(true)">← ODD</button>
      <button id="evenButton" onclick="checkAnswer(false)">EVEN →</button>
    </div>
    <div class="key-info">←  /  →  keys</div>
  </div>

  <div class="container hidden" id="game-over-screen">
    <h1>⏰ GAME OVER</h1>
    <div class="score-display" style="margin: 2rem auto; font-size: 3rem;">
      🏆 <span id="final-score">0</span>
    </div>
    <div class="menu-buttons">
      <button onclick="playAgain()">🔄 AGAIN</button>
      <button onclick="backToMenu()">🏠 MENU</button>
    </div>
  </div>

  <script>
    (function() {
      const menuScreen = document.getElementById('menu-screen');
      const gameScreen = document.getElementById('game-screen');
      const gameOverScreen = document.getElementById('game-over-screen');
      
      const scoreSpan = document.getElementById('score');
      const finalScoreSpan = document.getElementById('final-score');
      const numberDisplay = document.getElementById('number-display');
      const timerFill = document.getElementById('timer-fill');

      let currentNumber = 0;
      let score = 0;
      let timer;
      let timeLeft = 5;
      const BASE_TIME = 5;

      function computeTimeForScore(currentScore) {
        const raw = BASE_TIME * Math.pow(0.85, currentScore);
        return Math.max(1.3, raw);
      }

      function generateNumber() {
        currentNumber = Math.floor(Math.random() * 100) + 1;
        numberDisplay.textContent = currentNumber;
      }

      function startTimer() {
        clearTimeout(timer);
        timerFill.style.transition = 'none';
        timerFill.style.width = '100%';
        void timerFill.offsetWidth;
        timerFill.style.transition = `width ${timeLeft}s linear`;
        timerFill.style.width = '0%';
        
        timer = setTimeout(() => gameOver(), timeLeft * 1000);
      }

      function handleAnswer(isOdd) {
        const numberIsOdd = (currentNumber % 2 !== 0);
        if (isOdd === numberIsOdd) {
          score++;
          scoreSpan.textContent = score;
          timeLeft = computeTimeForScore(score);
          generateNumber();
          startTimer();
        } else {
          gameOver();
        }
      }

      window.checkAnswer = handleAnswer;

      function gameOver() {
        clearTimeout(timer);
        gameScreen.classList.add('hidden');
        gameOverScreen.classList.remove('hidden');
        finalScoreSpan.textContent = score;
      }

      function startGame() {
        score = 0;
        timeLeft = BASE_TIME;
        scoreSpan.textContent = '0';
        
        menuScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        generateNumber();
        startTimer();
      }

      function playAgain() {
        score = 0;
        timeLeft = BASE_TIME;
        scoreSpan.textContent = '0';
        
        gameOverScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        
        generateNumber();
        startTimer();
      }

      function backToMenu() {
        clearTimeout(timer);
        gameScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        menuScreen.classList.remove('hidden');
      }

      function keydownHandler(e) {
        if (!gameScreen.classList.contains('hidden')) {
          if (e.key === 'ArrowLeft') {
            e.preventDefault();
            handleAnswer(true);
          } else if (e.key === 'ArrowRight') {
            e.preventDefault();
            handleAnswer(false);
          }
        }
      }

      window.addEventListener('keydown', keydownHandler);

      window.startGame = startGame;
      window.playAgain = playAgain;
      window.backToMenu = backToMenu;
    })();
  </script>
</body>
</html>
