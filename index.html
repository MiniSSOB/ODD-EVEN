<!DOCTYPE html>
<html>
<head>
    <title>MiniBOSSX</title>
    <style>
        body { 
            background: black; 
            color: #8B0000; 
            font-family: Arial; 
            padding: 20px; 
            text-align: center;
        }
        h1 { 
            font-size: 4rem; 
            text-shadow: 0 0 10px #8B0000;
            margin-bottom: 30px;
        }
        .button {
            background: transparent;
            color: #8B0000;
            border: 2px solid #8B0000;
            padding: 10px 30px;
            margin: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
        }
        .button:hover {
            background: #8B0000;
            color: black;
        }
        textarea {
            width: 100%;
            max-width: 600px;
            height: 200px;
            background: black;
            border: 2px solid #8B0000;
            color: #8B0000;
            padding: 10px;
            margin: 20px auto;
            display: block;
            font-family: monospace;
        }
        input {
            width: 100%;
            max-width: 600px;
            padding: 10px;
            background: black;
            border: 2px solid #8B0000;
            color: #8B0000;
            margin: 10px auto;
            display: block;
        }
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 30px auto;
        }
        .game-card {
            border: 2px solid #8B0000;
            padding: 15px;
            border-radius: 10px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
        }
        .modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            margin: 2% auto;
            background: white;
            border: 2px solid #8B0000;
            border-radius: 10px;
        }
        .close {
            position: absolute;
            top: -30px;
            right: 0;
            color: #8B0000;
            font-size: 30px;
            cursor: pointer;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>⚡ MiniBOSSX ⚡</h1>
    
    <div>
        <button class="button" onclick="showHome()">HOME</button>
        <button class="button" onclick="showAddGame()">ADD GAME</button>
    </div>

    <!-- HOME PAGE -->
    <div id="homePage">
        <h2>🎮 GAMES</h2>
        <div id="gamesList" class="game-list"></div>
    </div>

    <!-- ADD GAME PAGE (hidden by default) -->
    <div id="addGamePage" style="display: none;">
        <h2>✏️ ADD NEW GAME</h2>
        
        <input type="text" id="gameName" placeholder="Game Name">
        <input type="text" id="gameDev" placeholder="Your Name">
        <textarea id="gameDesc" placeholder="Description"></textarea>
        
        <select id="gameCat" style="width:100%; max-width:600px; padding:10px; margin:10px auto; display:block; background:black; color:#8B0000; border:2px solid #8B0000;">
            <option value="ACTION">Action</option>
            <option value="PUZZLE">Puzzle</option>
            <option value="ARCADE">Arcade</option>
            <option value="OTHER">Other</option>
        </select>
        
        <select id="gamePlatform" style="width:100%; max-width:600px; padding:10px; margin:10px auto; display:block; background:black; color:#8B0000; border:2px solid #8B0000;">
            <option value="DESKTOP">Desktop</option>
            <option value="MOBILE">Mobile</option>
            <option value="BOTH">Both</option>
        </select>
        
        <h3 style="margin:20px 0;">Paste HTML code:</h3>
        <textarea id="gameCode" placeholder="<h1>My Game</h1>"></textarea>
        
        <div style="margin:20px;">— OR —</div>
        
        <div style="border:2px dashed #8B0000; padding:20px; max-width:600px; margin:20px auto; cursor:pointer;" onclick="document.getElementById('fileInput').click()">
            📁 Upload HTML file
            <input type="file" id="fileInput" accept=".html,.htm" style="display: none;" onchange="loadFile(this)">
        </div>
        
        <button class="button" onclick="saveGame()" style="margin-top:20px;">💾 SAVE GAME</button>
    </div>

    <!-- GAME MODAL -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <iframe id="gameFrame"></iframe>
        </div>
    </div>

    <script>
        // Show home page
        function showHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('addGamePage').style.display = 'none';
            loadGames();
        }
        
        // Show add game page
        function showAddGame() {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('addGamePage').style.display = 'block';
        }
        
        // Load file
        function loadFile(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('gameCode').value = e.target.result;
                };
                reader.readAsText(file);
            }
        }
        
        // Save game
        function saveGame() {
            const name = document.getElementById('gameName').value;
            const dev = document.getElementById('gameDev').value;
            const desc = document.getElementById('gameDesc').value;
            const cat = document.getElementById('gameCat').value;
            const platform = document.getElementById('gamePlatform').value;
            const code = document.getElementById('gameCode').value;
            
            if (!name || !dev || !desc || !code) {
                alert('Please fill all fields');
                return;
            }
            
            let games = JSON.parse(localStorage.getItem('games')) || [];
            
            games.push({
                id: Date.now(),
                name: name,
                developer: dev,
                description: desc,
                category: cat,
                platform: platform,
                html: code
            });
            
            localStorage.setItem('games', JSON.stringify(games));
            
            // Clear form
            document.getElementById('gameName').value = '';
            document.getElementById('gameDev').value = '';
            document.getElementById('gameDesc').value = '';
            document.getElementById('gameCode').value = '';
            
            alert('Game saved!');
            showHome();
        }
        
        // Load games
        function loadGames() {
            const games = JSON.parse(localStorage.getItem('games')) || [];
            const list = document.getElementById('gamesList');
            
            if (games.length === 0) {
                list.innerHTML = '<div style="grid-column:1/-1; padding:50px;">🚀 No games yet. Click ADD GAME to create one!</div>';
                return;
            }
            
            let html = '';
            games.forEach(game => {
                html += `
                    <div class="game-card">
                        <h3>${game.name}</h3>
                        <p style="color:#666;">by ${game.developer}</p>
                        <p style="color:#ccc;">${game.description}</p>
                        <p style="color:#8B0000; font-size:0.8rem;">${game.category} • ${game.platform}</p>
                        <button class="button" style="width:100%;" onclick="playGame('${game.id}')">▶ PLAY</button>
                    </div>
                `;
            });
            list.innerHTML = html;
        }
        
        // Play game
        function playGame(id) {
            const games = JSON.parse(localStorage.getItem('games')) || [];
            const game = games.find(g => g.id == id);
            
            if (game && game.html) {
                document.getElementById('gameFrame').srcdoc = game.html;
                document.getElementById('gameModal').style.display = 'block';
            }
        }
        
        // Close game
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').srcdoc = '';
        }
        
        // Load home page on start
        window.onload = function() {
            showHome();
        };
    </script>
</body>
</html>
