<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX - Game Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-center {
            text-align: center;
            padding-top: 30px;
        }
        
        h1 {
            font-size: 4rem;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0 30px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background: #8B0000;
            color: black;
        }
        
        .games-container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 90%;
            padding: 20px;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 10px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .game-card {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            background: rgba(139, 0, 0, 0.05);
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.3);
        }
        
        .game-title {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }
        
        .developer {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .description {
            color: #ccc;
            margin-bottom: 15px;
        }
        
        .tags {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .tag {
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        
        .category {
            background: #8B0000;
            color: black;
            font-weight: bold;
        }
        
        .platform {
            border: 1px solid #8B0000;
            color: #8B0000;
        }
        
        .play-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .play-btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .no-games {
            text-align: center;
            padding: 80px 20px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            grid-column: 1 / -1;
        }
        
        /* Counters */
        .counter-section {
            text-align: center;
            padding: 15px 0;
            border-top: 1px solid #333;
        }
        
        .counters {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }
        
        .counter {
            background: rgba(139, 0, 0, 0.1);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #8B0000;
        }
        
        .counter span {
            font-weight: bold;
            font-size: 1.1rem;
            margin-left: 5px;
        }
        
        .bottom {
            text-align: center;
            padding: 20px;
        }
        
        .copyright {
            opacity: 0.7;
        }
        
        /* Game Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
        }
        
        .modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            margin: 2% auto;
            background: black;
            border: 2px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
        }
        
        .close {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #8B0000;
            font-size: 30px;
            cursor: pointer;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="nav-bar">
        <a href="index.html">HOME</a>
        <a href="submit.html">SUBMIT</a>
    </div>
    
    <div class="games-container">
        <h2 class="section-title">🎮 GAMES</h2>
        <div id="gamesGrid" class="games-grid"></div>
    </div>
    
    <div class="counter-section">
        <div class="counters">
            <div class="counter">📊 Total: <span id="totalCount">0</span></div>
            <div class="counter">👤 Unique: <span id="uniqueCount">0</span></div>
            <div class="counter">⏳ 24h: <span id="last24hCount">0</span></div>
        </div>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>

    <!-- Game Modal -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <iframe id="gameFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <script>
        // ==================== LOAD GAMES ====================
        function loadGames() {
            const games = JSON.parse(localStorage.getItem('approved_games')) || [];
            const grid = document.getElementById('gamesGrid');
            
            if (games.length === 0) {
                grid.innerHTML = `
                    <div class="no-games">
                        <p>🚀 NO GAMES YET</p>
                        <div class="description">Be the first to submit your game</div>
                        <a href="submit.html" style="display:inline-block; margin-top:20px; padding:12px 30px; background:#8B0000; color:black; text-decoration:none; border-radius:5px; font-weight:bold;">SUBMIT GAME</a>
                    </div>
                `;
                return;
            }
            
            let html = '';
            games.forEach(game => {
                if (!game.html) return; // Skip if no game content
                
                html += `
                    <div class="game-card">
                        <h3 class="game-title">${escapeHtml(game.name)}</h3>
                        <div class="developer">by ${escapeHtml(game.developer)}</div>
                        <div class="description">${escapeHtml(game.description)}</div>
                        <div class="tags">
                            <span class="tag category">${escapeHtml(game.category)}</span>
                            <span class="tag platform">${escapeHtml(game.platform)}</span>
                        </div>
                        <button class="play-btn" onclick='playGame(${JSON.stringify(game.html)})'>▶ PLAY</button>
                    </div>
                `;
            });
            
            grid.innerHTML = html;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }
        
        function playGame(html) {
            if (!html) {
                alert('Game content not found');
                return;
            }
            document.getElementById('gameFrame').srcdoc = html;
            document.getElementById('gameModal').style.display = 'block';
        }
        
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').srcdoc = '';
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) closeGame();
        };
        
        // ==================== COUNTERS ====================
        function updateCounters() {
            const now = Date.now();
            const day = 24 * 60 * 60 * 1000;
            
            // Total
            let total = localStorage.getItem('total_visits') || '0';
            total = parseInt(total) + 1;
            localStorage.setItem('total_visits', total);
            document.getElementById('totalCount').textContent = total;
            
            // Unique
            let unique = localStorage.getItem('unique_visits') || '0';
            if (!localStorage.getItem('visitor')) {
                unique = parseInt(unique) + 1;
                localStorage.setItem('unique_visits', unique);
                localStorage.setItem('visitor', '1');
            }
            document.getElementById('uniqueCount').textContent = unique;
            
            // 24h
            let times = localStorage.getItem('visits_24h');
            times = times ? JSON.parse(times) : [];
            times = times.filter(t => now - t < day);
            times.push(now);
            localStorage.setItem('visits_24h', JSON.stringify(times));
            document.getElementById('last24hCount').textContent = times.length;
        }
        
        // ==================== INIT ====================
        window.onload = function() {
            loadGames();
            updateCounters();
        };
    </script>
</body>
</html>
