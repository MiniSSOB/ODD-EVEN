<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic 9 Box · Ask once a day</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #1a1e2c 0%, #2d3349 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 1.5rem;
            margin: 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 3rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.03);
            max-width: 650px;
            width: 100%;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 500;
            letter-spacing: -0.02em;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 0.25rem;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .sub {
            text-align: center;
            color: #a9b4d4;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            font-weight: 400;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
            padding-bottom: 1rem;
        }

        /* the 9 box */
        .nine-box {
            width: 220px;
            height: 220px;
            background: #121520;
            border-radius: 3.5rem;
            margin: 1.5rem auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 35px -8px black,
                inset 0 -5px 10px rgba(0,0,0,0.6),
                inset 0 5px 15px rgba(255,255,255,0.1);
            border: 1px solid rgba(255, 215, 100, 0.3);
            transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.2s, background 0.2s;
            cursor: pointer;
            user-select: none;
        }

        .nine-box:hover {
            transform: scale(1.02);
            box-shadow: 0 25px 45px -8px #000, 0 0 0 2px rgba(255, 215, 100, 0.4);
            background: #1b1f30;
        }

        .nine-box:active {
            transform: scale(0.98);
        }

        .nine-box.disabled {
            opacity: 0.45;
            filter: grayscale(0.6);
            pointer-events: none;
            box-shadow: 0 10px 20px -5px black;
        }

        .nine-box .nine {
            font-size: 8rem;
            font-weight: 700;
            color: #ffd964;
            text-shadow: 0 5px 15px #b27700, 0 -2px 5px #fff6d0;
            transform: rotate(-2deg);
            font-family: 'Times New Roman', serif;
        }

        .answer-area {
            background: rgba(10, 12, 22, 0.7);
            border-radius: 3rem;
            padding: 1.5rem 2rem;
            margin: 2rem 0 1.5rem;
            border-left: 4px solid #ffd964;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.35rem;
            line-height: 1.6;
            color: #f0eef7;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
            word-break: break-word;
        }

        .status-message {
            color: #b1c2e0;
            font-size: 1rem;
            margin: 1rem 0 0;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 3rem;
            text-align: center;
            font-weight: 400;
            border: 1px solid rgba(255,255,240,0.05);
        }

        .site-counter {
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: #7b89b3;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            border-top: 1px dashed rgba(255,255,255,0.1);
            padding-top: 1.5rem;
        }

        .counter-number {
            background: #1e2338;
            padding: 0.25rem 0.9rem;
            border-radius: 40px;
            font-weight: 600;
            color: #ffd964;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 215, 100, 0.3);
        }

        .btn-reset {
            background: none;
            border: none;
            color: #4b5a87;
            font-size: 0.8rem;
            text-decoration: underline dotted;
            cursor: pointer;
            margin-left: 0.75rem;
            transition: color 0.2s;
        }

        .btn-reset:hover {
            color: #a9b4d4;
        }

        footer {
            font-size: 0.8rem;
            text-align: center;
            color: #49557e;
            margin-top: 1rem;
        }
    </style>

            // ensure we have at least 200 (we have 210)

            // ----- DOM elements -----
            const nineBox = document.getElementById('nineBox');
            const answerDisplay = document.getElementById('answerDisplay');
            const statusDisplay = document.getElementById('statusMessage');
            const counterSpan = document.getElementById('counterDisplay');
            const resetBtn = document.getElementById('resetCounter');

            // ----- localStorage keys -----
            const LAST_CLICK_KEY = 'magic9_lastClick';
            const VISIT_COUNT_KEY = 'magic9_visitCount';

            // ----- once‑per‑day logic -----
            const ONE_DAY_MS = 24 * 60 * 60 * 1000; // 24 hours

            function getLastClickTime() {
                const stored = localStorage.getItem(LAST_CLICK_KEY);
                return stored ? parseInt(stored, 10) : 0;
            }

            function setLastClickTime(now = Date.now()) {
                localStorage.setItem(LAST_CLICK_KEY, now.toString());
            }

            function canClickToday() {
                const last = getLastClickTime();
                if (last === 0) return true; // never clicked
                return (Date.now() - last) >= ONE_DAY_MS;
            }

            function getTimeUntilNext() {
                const last = getLastClickTime();
                if (last === 0) return 0;
                const diff = ONE_DAY_MS - (Date.now() - last);
                return diff > 0 ? diff : 0;
            }

            function formatTimeRemaining(ms) {
                if (ms <= 0) return null;
                const hours = Math.floor(ms / (60 * 60 * 1000));
                const minutes = Math.floor((ms % (60 * 60 * 1000)) / (60 * 1000));
                const seconds = Math.floor((ms % (60 * 1000)) / 1000);
                return `${hours}h ${minutes}m ${seconds}s`;
            }

            // update UI based on daily limit
            function refreshDailyState() {
                if (canClickToday()) {
                    nineBox.classList.remove('disabled');
                    statusDisplay.innerText = '✨ click the 9 and receive a fortune';
                } else {
                    nineBox.classList.add('disabled');
                    const remaining = getTimeUntilNext();
                    if (remaining > 0) {
                        statusDisplay.innerText = `⏳ come back in ${formatTimeRemaining(remaining)}`;
                    } else {
                        statusDisplay.innerText = '🎉 you can click again! (refresh maybe)';
                        // edge case: force recheck after timeout?
                        nineBox.classList.remove('disabled');
                    }
                }
            }

            // ----- click handler -----
            function handleNineClick() {
                if (!canClickToday()) {
                    const remaining = getTimeUntilNext();
                    answerDisplay.innerText = '⏳ already asked today. wait for the 9 to recharge.';
                    statusDisplay.innerText = `next click in ${formatTimeRemaining(remaining)}`;
                    return;
                }

                // pick random answer
                const randomIndex = Math.floor(Math.random() * answers.length);
                const chosen = answers[randomIndex];
                answerDisplay.innerText = `🔮 ${chosen}`;
                statusDisplay.innerText = '✅ answer delivered. come back tomorrow!';

                // record the click
                setLastClickTime();
                // disable box visually
                nineBox.classList.add('disabled');
            }

            nineBox.addEventListener('click', handleNineClick);

            // ----- visitor counter (increments each page load) -----
            function updateCounter() {
                let count = localStorage.getItem(VISIT_COUNT_KEY);
                if (count === null) {
                    count = 1;
                } else {
                    count = parseInt(count, 10) + 1;
                }
                localStorage.setItem(VISIT_COUNT_KEY, count.toString());
                counterSpan.innerText = count;
            }

            // reset counter (fun feature)
            resetBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                localStorage.setItem(VISIT_COUNT_KEY, '0');
                counterSpan.innerText = '0';
                statusDisplay.innerText = 'counter reset 👻';
            });

            // ----- initialise -----
            updateCounter();
            refreshDailyState();

            // optionally recheck daily state every second (to update countdown)
            // but we can just keep static, or update occasionally
            setInterval(() => {
                refreshDailyState();
            }, 1000);
