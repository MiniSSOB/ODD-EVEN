<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX - Game Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-center {
            text-align: center;
            padding-top: 30px;
        }
        
        h1 {
            color: #8B0000;
            font-size: 4rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0 30px 0;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            font-size: 1.2rem;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            transition: all 0.3s;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background-color: #8B0000;
            color: black;
        }
        
        .games-container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            width: 90%;
            padding: 20px;
        }
        
        .section-title {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
            border-bottom: 1px solid #8B0000;
            padding-bottom: 10px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }
        
        .game-card {
            border: 1px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
            background-color: rgba(139, 0, 0, 0.05);
            transition: all 0.3s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.3);
        }
        
        .game-title {
            font-size: 1.5rem;
            margin-bottom: 5px;
            color: #8B0000;
        }
        
        .game-developer {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-style: italic;
        }
        
        .game-description {
            color: #ccc;
            font-size: 0.95rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        
        .game-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }
        
        .game-category {
            background-color: #8B0000;
            color: black;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .game-platform {
            background-color: transparent;
            color: #8B0000;
            border: 1px solid #8B0000;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        
        .play-button {
            display: inline-block;
            width: 100%;
            padding: 12px;
            background-color: transparent;
            color: #8B0000;
            border: 2px solid #8B0000;
            text-decoration: none;
            text-align: center;
            border-radius: 5px;
            transition: all 0.3s;
            font-weight: bold;
            cursor: pointer;
        }
        
        .play-button:hover {
            background-color: #8B0000;
            color: black;
        }
        
        .no-games {
            text-align: center;
            padding: 80px 20px;
            border: 2px dashed #8B0000;
            border-radius: 10px;
            margin: 40px 0;
            grid-column: 1 / -1;
        }
        
        .no-games p {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: #8B0000;
        }
        
        .no-games .sub-text {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }
        
        .submit-link {
            display: inline-block;
            padding: 12px 30px;
            background-color: #8B0000;
            color: black;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2rem;
            font-weight: bold;
            border: 2px solid #8B0000;
        }
        
        .submit-link:hover {
            background-color: transparent;
            color: #8B0000;
        }
        
        .counter-section {
            text-align: center;
            padding: 15px 0;
            border-top: 1px solid #333;
            margin-top: 20px;
        }
        
        .visitor-counter {
            color: #8B0000;
            font-size: 0.8rem;
            opacity: 0.7;
            letter-spacing: 1px;
        }
        
        .visitor-counter span {
            font-size: 0.9rem;
            font-weight: bold;
            color: #8B0000;
            opacity: 1;
            margin: 0 5px;
        }
        
        .bottom {
            text-align: center;
            padding: 20px 0 30px 0;
        }
        
        .copyright {
            color: #8B0000;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        
        /* Game Player Modal */
        .game-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow: auto;
        }
        
        .game-modal-content {
            position: relative;
            width: 90%;
            height: 90%;
            margin: 2% auto;
            background-color: black;
            border: 2px solid #8B0000;
            border-radius: 10px;
            padding: 20px;
        }
        
        .close-modal {
            position: absolute;
            top: 10px;
            right: 20px;
            color: #8B0000;
            font-size: 30px;
            cursor: pointer;
            z-index: 1001;
        }
        
        .close-modal:hover {
            color: #ff0000;
        }
        
        .game-frame {
            width: 100%;
            height: 100%;
            border: none;
            background-color: white;
        }
        
        .admin-secret {
            display: none;
        }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="nav-bar">
        <a href="index.html">HOME</a>
        <a href="submit.html">SUBMIT</a>
    </div>
    
    <div class="games-container">
        <h2 class="section-title">🎮 GAMES</h2>
        
        <div id="gamesGrid" class="games-grid">
            <!-- Games will be loaded here -->
        </div>
    </div>
    
    <div class="counter-section">
        <div class="visitor-counter">
            👁️ <span id="visitorCount">0</span> visitors
        </div>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>

    <!-- Game Player Modal -->
    <div id="gameModal" class="game-modal">
        <div class="game-modal-content">
            <span class="close-modal" onclick="closeGame()">&times;</span>
            <iframe id="gameFrame" class="game-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
        </div>
    </div>

    <!-- Secret admin link (only you know to add /admin to URL) -->
    <div style="display: none;">admin</div>

    <script>
        // ==================== LOAD APPROVED GAMES ====================
        function loadGames() {
            const gamesGrid = document.getElementById('gamesGrid');
            const approvedGames = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            
            if (approvedGames.length === 0) {
                gamesGrid.innerHTML = `
                    <div class="no-games">
                        <p>🚀 NO GAMES YET</p>
                        <div class="sub-text">Be the first to submit your game</div>
                        <a href="submit.html" class="submit-link">SUBMIT GAME</a>
                    </div>
                `;
                return;
            }
            
            let html = '';
            approvedGames.forEach(game => {
                html += `
                    <div class="game-card">
                        <h3 class="game-title">${game.name}</h3>
                        <div class="game-developer">by ${game.developer}</div>
                        <div class="game-description">${game.description}</div>
                        <div class="game-meta">
                            <span class="game-category">${game.category}</span>
                            <span class="game-platform">${game.platform}</span>
                        </div>
                        <button onclick="playGame(${game.id})" class="play-button">▶ PLAY</button>
                    </div>
                `;
            });
            
            gamesGrid.innerHTML = html;
        }
        
        // ==================== PLAY GAME ====================
        function playGame(gameId) {
            const approvedGames = JSON.parse(localStorage.getItem('minibossx_approved')) || [];
            const game = approvedGames.find(g => g.id === gameId);
            
            if (game && game.htmlContent) {
                const gameFrame = document.getElementById('gameFrame');
                const modal = document.getElementById('gameModal');
                
                // Write the HTML content to the iframe
                gameFrame.srcdoc = game.htmlContent;
                modal.style.display = 'block';
            } else {
                alert('Game content not found');
            }
        }
        
        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
            document.getElementById('gameFrame').srcdoc = ''; // Clear the game
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('gameModal');
            if (event.target === modal) {
                closeGame();
            }
        }
        
        // ==================== VISITOR COUNTER ====================
        function updateCounter() {
            let count = localStorage.getItem('minibossx_visitors') || '0';
            count = parseInt(count) + 1;
            localStorage.setItem('minibossx_visitors', count);
            document.getElementById('visitorCount').textContent = count;
        }
        
        // ==================== INIT ====================
        window.onload = function() {
            loadGames();
            updateCounter();
        };
    </script>
</body>
</html>
