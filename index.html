<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-center {
            text-align: center;
            padding-top: 40px;
            flex: 1;
        }
        
        h1 {
            color: #8B0000;
            font-size: 5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
            display: inline-block;
        }
        
        .bottom {
            text-align: center;
            padding-bottom: 20px;
        }
        
        .copyright {
            color: #8B0000;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>
</body>
</html>
