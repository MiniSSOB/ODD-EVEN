<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX - Submit Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            color: #8B0000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .top-center {
            text-align: center;
            padding-top: 30px;
        }
        
        h1 {
            color: #8B0000;
            font-size: 4rem;
            text-shadow: 0 0 10px rgba(139, 0, 0, 0.5);
        }
        
        .nav-bar {
            text-align: center;
            margin: 20px 0 30px;
        }
        
        .nav-bar a {
            color: #8B0000;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 25px;
            border: 2px solid #8B0000;
            border-radius: 5px;
            display: inline-block;
        }
        
        .nav-bar a:hover {
            background: #8B0000;
            color: black;
        }
        
        .submit-container {
            max-width: 600px;
            margin: 0 auto;
            width: 90%;
            padding: 30px;
            border: 1px solid #8B0000;
            border-radius: 15px;
            background: rgba(139, 0, 0, 0.05);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 10px;
            background: black;
            border: 1px solid #8B0000;
            color: #8B0000;
            border-radius: 5px;
        }
        
        textarea {
            height: 100px;
        }
        
        .file-area {
            border: 2px dashed #8B0000;
            padding: 30px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            border-radius: 10px;
        }
        
        .file-area:hover {
            background: rgba(139, 0, 0, 0.1);
        }
        
        .file-name {
            margin-top: 10px;
            color: #8B0000;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: 2px solid #8B0000;
            color: #8B0000;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        
        .btn:hover {
            background: #8B0000;
            color: black;
        }
        
        .btn-primary {
            background: #8B0000;
            color: black;
        }
        
        .success {
            display: none;
            text-align: center;
            padding: 40px;
            border: 2px solid #8B0000;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .success.show {
            display: block;
        }
        
        .bottom {
            text-align: center;
            padding: 20px;
            margin-top: auto;
        }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="nav-bar">
        <a href="index.html">HOME</a>
        <a href="submit.html">SUBMIT</a>
    </div>
    
    <div class="submit-container">
        <h2>🎮 SUBMIT YOUR GAME</h2>
        
        <form id="submitForm">
            <div class="form-group">
                <label>Game Name</label>
                <input type="text" id="gameName" required>
            </div>
            
            <div class="form-group">
                <label>Developer Name</label>
                <input type="text" id="developerName" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="ACTION">Action</option>
                    <option value="PUZZLE">Puzzle</option>
                    <option value="ARCADE">Arcade</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Platform</label>
                <select id="platform" required>
                    <option value="DESKTOP">Desktop</option>
                    <option value="MOBILE">Mobile</option>
                    <option value="BOTH">Both</option>
                </select>
            </div>
            
            <div class="file-area" onclick="document.getElementById('gameFile').click()">
                📂 Click to select HTML file
                <input type="file" id="gameFile" accept=".html,.htm" style="display: none;" onchange="handleFile(this)">
            </div>
            <div id="fileName" class="file-name"></div>
            
            <div class="button-group">
                <button type="button" class="btn btn-primary" onclick="submitGame()">SUBMIT</button>
                <button type="reset" class="btn">CLEAR</button>
            </div>
        </form>
        
        <div id="successMessage" class="success">
            <div style="font-size: 4rem; margin-bottom: 20px;">✅</div>
            <h3>GAME SUBMITTED!</h3>
            <p>We'll review it and notify you.</p>
            <button class="btn btn-primary" onclick="resetForm()">SUBMIT ANOTHER</button>
        </div>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>

    <script>
        let selectedFile = null;
        
        function handleFile(input) {
            selectedFile = input.files[0];
            if (selectedFile) {
                document.getElementById('fileName').textContent = `Selected: ${selectedFile.name}`;
            }
        }
        
        function submitGame() {
            // Get form data
            const gameData = {
                gameName: document.getElementById('gameName').value,
                developerName: document.getElementById('developerName').value,
                email: document.getElementById('email').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                platform: document.getElementById('platform').value
            };
            
            // Validate
            for (let key in gameData) {
                if (!gameData[key]) {
                    alert('Please fill all fields');
                    return;
                }
            }
            
            if (!selectedFile) {
                alert('Please select a file');
                return;
            }
            
            // Read file
            const reader = new FileReader();
            reader.onload = function(e) {
                // Create submission object
                const submission = {
                    id: Date.now(),
                    ...gameData,
                    fileContent: e.target.result,  // This is the ONLY place HTML goes
                    date: new Date().toISOString()
                };
                
                // Save to pending
                const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
                pending.push(submission);
                localStorage.setItem('pending_games', JSON.stringify(pending));
                
                // Show success
                document.getElementById('submitForm').style.display = 'none';
                document.getElementById('successMessage').classList.add('show');
            };
            
            reader.readAsText(selectedFile);
        }
        
        function resetForm() {
            document.getElementById('submitForm').reset();
            document.getElementById('submitForm').style.display = 'block';
            document.getElementById('successMessage').classList.remove('show');
            document.getElementById('fileName').textContent = '';
            selectedFile = null;
        }
    </script>
</body>
</html>
