<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniBOSSX - Submit Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; color: #8B0000; font-family: Arial; min-height: 100vh; display: flex; flex-direction: column; }
        .top-center { text-align: center; padding: 30px 0 20px; }
        h1 { font-size: 4rem; text-shadow: 0 0 10px rgba(139,0,0,0.5); }
        .nav-bar { text-align: center; margin: 20px 0 30px; }
        .nav-bar a { color: #8B0000; text-decoration: none; margin: 0 10px; padding: 8px 25px; border: 2px solid #8B0000; border-radius: 5px; display: inline-block; }
        .nav-bar a:hover { background: #8B0000; color: black; }
        
        .submit-container { max-width: 600px; margin: 0 auto; width: 90%; padding: 30px; border: 1px solid #8B0000; border-radius: 15px; background: rgba(139,0,0,0.05); }
        h2 { text-align: center; margin-bottom: 30px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 10px; background: black; border: 1px solid #8B0000; color: #8B0000; border-radius: 5px; }
        textarea { height: 100px; }
        
        .file-area { border: 2px dashed #8B0000; padding: 20px; text-align: center; margin: 20px 0; cursor: pointer; border-radius: 5px; }
        .file-area:hover { background: rgba(139,0,0,0.1); }
        .file-name { margin-top: 10px; color: #8B0000; }
        
        .btn { width: 100%; padding: 15px; background: transparent; border: 2px solid #8B0000; color: #8B0000; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #8B0000; color: black; }
        .btn-primary { background: #8B0000; color: black; }
        
        .success { display: none; text-align: center; padding: 40px; border: 2px solid #8B0000; border-radius: 15px; margin-top: 20px; }
        .success.show { display: block; }
        .success-icon { font-size: 4rem; margin-bottom: 20px; }
        
        .bottom { text-align: center; padding: 20px; margin-top: auto; }
        .copyright { opacity: 0.7; }
    </style>
</head>
<body>
    <div class="top-center">
        <h1>MiniBOSSX</h1>
    </div>
    
    <div class="nav-bar">
        <a href="index.html">HOME</a>
        <a href="submit.html">SUBMIT</a>
    </div>
    
    <div class="submit-container">
        <h2>🎮 SUBMIT YOUR GAME</h2>
        
        <form id="submitForm">
            <div class="form-group">
                <label>Game Name</label>
                <input type="text" id="gameName" required>
            </div>
            
            <div class="form-group">
                <label>Developer Name</label>
                <input type="text" id="developerName" required>
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="description" required></textarea>
            </div>
            
            <div class="form-group">
                <label>Category</label>
                <select id="category" required>
                    <option value="ACTION">Action</option>
                    <option value="PUZZLE">Puzzle</option>
                    <option value="ARCADE">Arcade</option>
                    <option value="OTHER">Other</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Platform</label>
                <select id="platform" required>
                    <option value="DESKTOP">Desktop</option>
                    <option value="MOBILE">Mobile</option>
                    <option value="BOTH">Both</option>
                </select>
            </div>
            
            <div class="file-area" onclick="document.getElementById('gameFile').click()">
                📂 Click to select HTML file
                <input type="file" id="gameFile" accept=".html,.htm" style="display: none;" onchange="handleFile(this)">
            </div>
            <div id="fileName" class="file-name"></div>
            
            <button type="button" class="btn btn-primary" onclick="submitGame()" style="margin-top:20px;">SUBMIT GAME</button>
        </form>
        
        <div id="successMessage" class="success">
            <div class="success-icon">✅</div>
            <h3>GAME SUBMITTED!</h3>
            <p>We'll review it and add it to the site.</p>
            <button class="btn" onclick="resetForm()">SUBMIT ANOTHER</button>
        </div>
    </div>
    
    <div class="bottom">
        <p class="copyright">MiniBOSSX © 2026</p>
    </div>

    <script>
        let selectedFile = null;
        
        function handleFile(input) {
            selectedFile = input.files[0];
            document.getElementById('fileName').textContent = selectedFile ? `Selected: ${selectedFile.name}` : '';
        }
        
        function submitGame() {
            const gameData = {
                name: document.getElementById('gameName').value,
                developer: document.getElementById('developerName').value,
                email: document.getElementById('email').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                platform: document.getElementById('platform').value
            };
            
            for (let key in gameData) {
                if (!gameData[key]) {
                    alert('Please fill all fields');
                    return;
                }
            }
            
            if (!selectedFile) {
                alert('Please select your HTML file');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const submission = {
                    id: Date.now(),
                    ...gameData,
                    html: e.target.result,
                    date: new Date().toLocaleString()
                };
                
                const pending = JSON.parse(localStorage.getItem('pending_games')) || [];
                pending.push(submission);
                localStorage.setItem('pending_games', JSON.stringify(pending));
                
                document.getElementById('submitForm').style.display = 'none';
                document.getElementById('successMessage').classList.add('show');
            };
            
            reader.readAsText(selectedFile);
        }
        
        function resetForm() {
            document.getElementById('submitForm').reset();
            document.getElementById('submitForm').style.display = 'block';
            document.getElementById('successMessage').classList.remove('show');
            document.getElementById('fileName').textContent = '';
            selectedFile = null;
        }
    </script>
</body>
</html>
